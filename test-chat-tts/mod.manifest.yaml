id: world.nimi.test-chat-tts
name: Test Chat + TTS + Image
version: 1.0.0
kind: capability-mod
icon: local-chat
entry: ./dist/mods/test-chat-tts/index.js
description: >
  Minimal test mod for validating chat, image, and TTS pipelines end-to-end.
capabilities:
  - runtime.ai.text.generate
  - runtime.media.image.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.synthesize
  - runtime.route.list.options
  - runtime.route.resolve
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
    - image
    - tts
