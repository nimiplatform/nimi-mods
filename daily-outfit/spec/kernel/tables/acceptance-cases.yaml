version: 1
cases:
  # Onboarding
  - id: DO-001-ONBOARDING-COMPLETE
    description: 完成 Onboarding 流程后生成有效的 UserProfile，包含 gender、ageGroup、styleWeights、sceneFrequencies。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-002-ONBOARDING-SKIP-STYLE
    description: 用户跳过风格测试步骤，styleWeights 为空映射，推荐时不附加偏好权重。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-003-ONBOARDING-SELFIE-FAIL
    description: 自拍分析失败为非阻塞错误，Onboarding 可继续完成。
    expected_ok: true
    reason_code: DAILY_OUTFIT_SELFIE_ANALYZE_FAILED
    source_rule: DO-ACC-002
  - id: DO-004-ONBOARDING-REDO
    description: 用户可在设置中重新进行 Onboarding，覆盖已有画像。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002

  # 衣物录入
  - id: DO-010-GARMENT-SINGLE-PHOTO
    description: 上传单张衣物照片，AI 正确识别分类并生成 GarmentItem。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-011-GARMENT-MULTI-ITEM-PHOTO
    description: 单张平铺照片包含多件衣物，AI 逐件识别并生成多个 GarmentItem。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-012-GARMENT-CLASSIFY-FAIL
    description: AI 分类失败时保留原始照片，允许用户全手动填写分类。
    expected_ok: true
    reason_code: DAILY_OUTFIT_GARMENT_CLASSIFY_FAILED
    source_rule: DO-ACC-002
  - id: DO-013-GARMENT-USER-CORRECT
    description: 用户修正 AI 分类结果后正确保存。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-014-GARMENT-THUMBNAIL-FAIL
    description: 去背景失败为非阻塞，使用原始照片替代缩略图。
    expected_ok: true
    reason_code: DAILY_OUTFIT_THUMBNAIL_GEN_FAILED
    source_rule: DO-ACC-002

  # 穿搭推荐
  - id: DO-020-RECOMMEND-BASIC
    description: 输入场景描述后生成至少一套可用的 OutfitCombo。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-021-RECOMMEND-MULTI-PLAN
    description: 一次推荐生成 1-3 个备选方案供对比。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-022-RECOMMEND-WARDROBE-EMPTY
    description: 衣橱为空时返回阻塞错误并提示添加衣物。
    expected_ok: false
    reason_code: DAILY_OUTFIT_WARDROBE_EMPTY
    source_rule: DO-ACC-002
  - id: DO-023-RECOMMEND-INSUFFICIENT
    description: 衣橱衣物不足以覆盖场景需求时，AI 在 aiReasoning 中说明缺失项。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-024-RECOMMEND-PROFILE-WEIGHT
    description: 推荐时 AI prompt 包含 UserProfile styleWeights 作为软权重上下文。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002

  # 虚拟试穿
  - id: DO-030-TRYON-SUCCESS
    description: 虚拟试穿成功生成效果图并写入 OutfitCombo.tryOnImageUrl。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-031-TRYON-FAIL-FALLBACK
    description: 虚拟试穿失败时降级到拼图预览，不阻塞用户流程。
    expected_ok: true
    reason_code: DAILY_OUTFIT_TRYON_GENERATE_FAILED
    source_rule: DO-ACC-002
  - id: DO-032-TRYON-NO-SELFIE
    description: 未上传自拍时点击试穿返回阻塞错误并提示上传。
    expected_ok: false
    reason_code: DAILY_OUTFIT_SELFIE_MISSING
    source_rule: DO-ACC-002

  # 迭代调整
  - id: DO-040-REFINE-LOCK-PRESERVE
    description: 锁定单品在重新搭配时不被替换。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-041-REFINE-MULTI-ROUND
    description: 多轮迭代中 lockedItemIds 可累加或减少。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-042-REFINE-NO-CANDIDATES
    description: 锁定约束下无候选时返回错误并建议解锁。
    expected_ok: false
    reason_code: DAILY_OUTFIT_REFINE_NO_CANDIDATES
    source_rule: DO-ACC-002

  # 收藏与日志
  - id: DO-050-FAVORITE-SAVE
    description: 收藏方案后 isFavorite 持久化且 styleWeights 对应风格 +0.1。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-051-WEARLOG-STATS-UPDATE
    description: 穿搭日志确认后 wearCount 递增、lastWornAt 更新。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-052-REJECT-WEIGHT-UPDATE
    description: 拒绝方案后 styleWeights 对应风格 -0.05。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-053-SCENE-FREQ-UPDATE
    description: 穿搭日志确认后 sceneFrequencies 自动更新。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002

  # 衣橱洞察
  - id: DO-060-INSIGHT-RETIRE-SUGGEST
    description: 正确识别超过 90 天未穿的 active 衣物并标记为淘汰候选。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-061-INSIGHT-STYLE-DIST
    description: 风格分布统计正确反映衣橱中各 styleTags 的数量占比。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-062-INSIGHT-GAP-DETECT
    description: 缺口建议正确检测高频场景的覆盖不足。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002

  # 数据与隐私
  - id: DO-070-LOCAL-STORAGE
    description: 所有数据默认存储在本地 IndexedDB。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-071-CLOUD-SYNC-TOGGLE
    description: 云端同步开关生效，关闭时不发起任何云端请求。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-072-PRIVACY-CONSENT
    description: 隐私协议未同意时不启动云端同步。
    expected_ok: true
    reason_code: null
    source_rule: DO-ACC-002
  - id: DO-073-CLOUD-SYNC-FAIL
    description: 云端同步失败为非阻塞，数据保留在本地。
    expected_ok: true
    reason_code: DAILY_OUTFIT_CLOUD_SYNC_FAILED
    source_rule: DO-ACC-002

verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:daily-outfit-kernel-docs
    source_rule: DO-ACC-001
  - command: pnpm -C nimi-mods run check:spec:daily-outfit-kernel-docs-drift
    source_rule: DO-ACC-001
  - command: pnpm -C nimi-mods run check:spec:daily-outfit-kernel-consistency
    source_rule: DO-ACC-001
