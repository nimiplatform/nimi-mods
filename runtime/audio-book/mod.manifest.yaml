id: world.nimi.audio-book
name: Audio Book
version: 0.1.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/audio-book/index.js
styles:
  - ./dist/mods/audio-book/index.css
description: >
  多角色 AI 有声书生成工作室。
capabilities:
  - runtime.ai.text.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.synthesize
  - runtime.route.list.options
  - runtime.route.resolve
  - storage.sqlite.query
  - storage.sqlite.execute
  - storage.files.read
  - storage.files.write
  - storage.files.delete
  - storage.files.list
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - event.publish.ab:synthesis:progress
  - event.subscribe.ab:synthesis:progress
ai:
  consume:
    - chat
    - tts
  profiles:
    - id: audio-book-default
      title: Default narration stack
      description: Balanced audiobook stack with Qwen2.5 chat and Qwen3 TTS 1.7B.
      recommended: true
      consumeCapabilities:
        - chat
        - tts
      entries:
        - entryId: audio-book/chat-qwen2.5-7b
          kind: model
          capability: chat
          modelId: qwen2.5-7b-instruct
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (analysis)
          required: true
          preferred: true
        - entryId: audio-book/tts-qwen3-1.7b
          kind: service
          capability: tts
          serviceId: qwen-tts-python
          modelId: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
          repo: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
          engine: qwen-tts-python
          title: Qwen3 TTS 1.7B (recommended)
          required: true
          preferred: true
    - id: audio-book-compact
      title: Compact narration stack
      description: Smaller audiobook stack with Qwen2.5 chat and Qwen3 TTS 0.6B.
      recommended: false
      consumeCapabilities:
        - chat
        - tts
      entries:
        - entryId: audio-book/chat-qwen2.5-7b
          kind: model
          capability: chat
          modelId: qwen2.5-7b-instruct
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (analysis)
          required: true
          preferred: true
        - entryId: audio-book/tts-qwen3-0.6b
          kind: service
          capability: tts
          serviceId: qwen-tts-python
          modelId: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
          repo: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
          engine: qwen-tts-python
          title: Qwen3 TTS 0.6B
          required: true
          preferred: true
