id: world.nimi.knowledge-base
name: Knowledge Base
version: 1.0.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/knowledge-base/index.js
styles:
  - ./dist/mods/knowledge-base/index.css
description: >
  Private local knowledge base with document import, semantic search, and RAG-powered Q&A.
capabilities:
  # AI
  - runtime.ai-config.get
  - runtime.ai-config.update
  - runtime.ai-config.subscribe
  - runtime.ai-config.probe.scheduling.target
  - runtime.ai-snapshot.record
  - runtime.ai.text.generate
  - runtime.ai.text.stream
  - runtime.ai.embedding.generate
  - runtime.route.list.options
  - storage.sqlite.query
  - storage.sqlite.execute
  # Data register + query pairs (8 APIs)
  - data.register.data-api.knowledge-base.documents.list
  - data.query.data-api.knowledge-base.documents.list
  - data.register.data-api.knowledge-base.documents.import
  - data.query.data-api.knowledge-base.documents.import
  - data.register.data-api.knowledge-base.documents.delete
  - data.query.data-api.knowledge-base.documents.delete
  - data.register.data-api.knowledge-base.search
  - data.query.data-api.knowledge-base.search
  - data.register.data-api.knowledge-base.conversations.list
  - data.query.data-api.knowledge-base.conversations.list
  - data.register.data-api.knowledge-base.conversations.get
  - data.query.data-api.knowledge-base.conversations.get
  - data.register.data-api.knowledge-base.conversations.upsert
  - data.query.data-api.knowledge-base.conversations.upsert
  - data.register.data-api.knowledge-base.conversations.delete
  - data.query.data-api.knowledge-base.conversations.delete
  # UI
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
    - embedding
  profiles:
    - id: knowledge-base-llama
      title: Default RAG stack
      description: Qwen2.5 chat with llama embeddings.
      recommended: true
      consumeCapabilities:
        - chat
        - embedding
      entries:
        - entryId: knowledge-base/chat-qwen2.5-7b
          kind: asset
          capability: chat
          assetId: qwen2.5-7b-instruct
          assetKind: chat
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (default)
          required: true
          preferred: true
        - entryId: knowledge-base/embedding-llama
          kind: node
          capability: embedding
          nodeId: embedding.generate.llama
          title: Local embedding node (llama)
          engine: llama
          required: true
          preferred: true
