version: 1
codes:
  - code: KB_FORMAT_UNSUPPORTED
    stage: parsing
    blocking: true
    action_hint: Convert to a supported format (txt, md, csv, json, html) and re-import.
    source_rule: KB-ERR-003
  - code: KB_PARSING_FAILED
    stage: parsing
    blocking: true
    action_hint: Check file content integrity and re-import.
    source_rule: KB-ERR-003
  - code: KB_CHUNKING_FAILED
    stage: chunking
    blocking: true
    action_hint: Retry document import.
    source_rule: KB-ERR-002
  - code: KB_EMBEDDING_FAILED
    stage: embedding
    blocking: true
    action_hint: Check embedding provider availability and retry.
    source_rule: KB-ERR-002
  - code: KB_EMBEDDING_ROUTE_UNAVAILABLE
    stage: embedding
    blocking: true
    action_hint: Configure an embedding route (cloud or local).
    source_rule: KB-ERR-003
  - code: KB_SEARCH_EMPTY
    stage: vector-search
    blocking: false
    action_hint: Broaden query or lower similarity threshold.
    source_rule: KB-ERR-004
  - code: KB_SEARCH_FAILED
    stage: vector-search
    blocking: true
    action_hint: Retry search or check vector store integrity.
    source_rule: KB-ERR-002
  - code: KB_AI_GENERATE_FAILED
    stage: llm-stream
    blocking: true
    action_hint: Retry generation or switch chat route.
    source_rule: KB-ERR-002
  - code: KB_QUERY_REWRITE_FAILED
    stage: query-rewrite
    blocking: false
    action_hint: Falls back to original query automatically.
    source_rule: KB-ERR-004
  - code: KB_STORAGE_QUOTA_EXCEEDED
    stage: storage
    blocking: true
    action_hint: Free browser storage or delete unused documents.
    source_rule: KB-ERR-002
  - code: KB_DOCUMENT_NOT_FOUND
    stage: query
    blocking: true
    action_hint: Verify document ID exists.
    source_rule: KB-ERR-002
  - code: KB_CONVERSATION_NOT_FOUND
    stage: query
    blocking: true
    action_hint: Verify conversation ID exists.
    source_rule: KB-ERR-002
