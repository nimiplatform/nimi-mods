version: 1
mod_identity:
  mod_id: world.nimi.knowledge-base
  name: Knowledge Base
  entry: ./dist/mods/knowledge-base/index.js
  source_rule: KB-CAP-001
required_capabilities:
  - key: runtime.ai.text.generate
    purpose: Single-turn text generation (query rewriting, title generation)
    source_rule: KB-CAP-002
  - key: runtime.ai.text.stream
    purpose: Streaming text generation (RAG answer)
    source_rule: KB-CAP-002
  - key: runtime.ai.embedding.generate
    purpose: Vectorization (chunk embedding + query embedding)
    source_rule: KB-CAP-002
  - key: runtime.route.list.options
    purpose: Query available text.generate / text.embed route options (15s polling)
    source_rule: KB-CAP-006
  - key: data.register.data-api.knowledge-base.documents.list
    purpose: Register document list API
    source_rule: KB-CAP-003
  - key: data.query.data-api.knowledge-base.documents.list
    purpose: Query document list
    source_rule: KB-CAP-003
  - key: data.register.data-api.knowledge-base.documents.import
    purpose: Register document import API
    source_rule: KB-CAP-003
  - key: data.query.data-api.knowledge-base.documents.import
    purpose: Query document import
    source_rule: KB-CAP-003
  - key: data.register.data-api.knowledge-base.documents.delete
    purpose: Register document delete API
    source_rule: KB-CAP-003
  - key: data.query.data-api.knowledge-base.documents.delete
    purpose: Query document delete (cascade chunk + vector)
    source_rule: KB-CAP-003
  - key: data.register.data-api.knowledge-base.search
    purpose: Register semantic search API
    source_rule: KB-CAP-004
  - key: data.query.data-api.knowledge-base.search
    purpose: Cross-mod semantic search entry point
    source_rule: KB-CAP-004
  - key: data.register.data-api.knowledge-base.conversations.list
    purpose: Register conversation list API
    source_rule: KB-CAP-005
  - key: data.query.data-api.knowledge-base.conversations.list
    purpose: Query conversation list
    source_rule: KB-CAP-005
  - key: data.register.data-api.knowledge-base.conversations.get
    purpose: Register conversation get API
    source_rule: KB-CAP-005
  - key: data.query.data-api.knowledge-base.conversations.get
    purpose: Query full conversation with turns
    source_rule: KB-CAP-005
  - key: data.register.data-api.knowledge-base.conversations.upsert
    purpose: Register conversation upsert API
    source_rule: KB-CAP-005
  - key: data.query.data-api.knowledge-base.conversations.upsert
    purpose: Query conversation upsert
    source_rule: KB-CAP-005
  - key: data.register.data-api.knowledge-base.conversations.delete
    purpose: Register conversation delete API
    source_rule: KB-CAP-005
  - key: data.query.data-api.knowledge-base.conversations.delete
    purpose: Query conversation delete
    source_rule: KB-CAP-005
  - key: ui.register.ui-extension.app.sidebar.mods
    purpose: Sidebar nav-item entry (priority 160)
    source_rule: KB-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    purpose: Content route page
    source_rule: KB-CAP-001
allowed_sdk_surfaces:
  - package: '@nimiplatform/sdk/mod'
    apis:
      - createModRuntimeClient
    source_rule: KB-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: KB-CAP-002
forbidden_patterns:
  - pattern: sdk-mod-host-direct-import
    reason: bypasses stable mod SDK boundary
    source_rule: KB-CAP-002
  - pattern: provider-private-embedding-http
    reason: bypasses embedding capability governance
    source_rule: KB-CAP-002
