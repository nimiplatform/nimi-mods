id: world.nimi.kismet
name: Kismet
version: 1.0.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/kismet/index.js
styles:
  - ./dist/mods/kismet/index.css
description: >
  BaZi destiny analysis workbench. Generates KismetResult via any
  available chat model and renders candlestick chart visualization.
capabilities:
  - runtime.ai.text.generate
  - runtime.route.list.options
  - runtime.route.resolve
  - runtime.route.check.health
  - storage.sqlite.query
  - storage.sqlite.execute
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
  profiles:
    - id: kismet-default
      title: Default analysis stack
      description: Balanced local chat model for BaZi analysis.
      recommended: true
      consumeCapabilities:
        - chat
      entries:
        - entryId: kismet/chat-qwen2.5-7b
          kind: model
          capability: chat
          modelId: qwen2.5-7b-instruct
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (analysis)
          required: true
          preferred: true
requires:
  - desktop-core-cloud-chat
