version: 2
execution_chain:
  - step: birth-intake
    order: 1
    type: user-input
    description: collect birth date, time, city, timezone, and local consent flags
    source_rule: KIS-PIPE-001
  - step: birth-normalize
    order: 2
    type: deterministic
    description: validate birth input and resolve catalog-backed city
    source_rule: KIS-PIPE-001
  - step: pillar-derive
    order: 3
    type: deterministic
    description: derive canonical pillars and five-element profile
    source_rule: KIS-PIPE-001
  - step: canonical-profile-validate
    order: 4
    type: deterministic
    description: validate canonical natal structure before any narrative generation
    source_rule: KIS-PIPE-001
  - step: natal-analysis-generate
    order: 5
    type: llm
    description: generate natal analysis and keyNodes JSON only
    source_rule: KIS-PIPE-001
  - step: city-affinity-score
    order: 6
    type: deterministic
    description: compute birth-city context and ranked city affinity list
    source_rule: KIS-PIPE-001
  - step: render
    order: 7
    type: ui
    description: render natal result, city map, and narrative cards
    source_rule: KIS-PIPE-001

daily_fortune_chain:
  - step: profile-load
    order: 1
    type: deterministic
    source_rule: KIS-PIPE-002
  - step: day-context-derive
    order: 2
    type: deterministic
    source_rule: KIS-PIPE-002
  - step: daily-fortune-generate
    order: 3
    type: llm
    source_rule: KIS-PIPE-002
  - step: render
    order: 4
    type: ui
    source_rule: KIS-PIPE-002

compatibility_chain:
  - step: consent-check
    order: 1
    type: deterministic
    source_rule: KIS-PIPE-003
  - step: public-profile-load
    order: 2
    type: deterministic
    description: load local derived target profile or derive from second birth intake
    source_rule: KIS-PIPE-003
  - step: compatibility-score
    order: 3
    type: deterministic
    source_rule: KIS-PIPE-003
  - step: compatibility-explain
    order: 4
    type: llm
    source_rule: KIS-PIPE-003
  - step: render
    order: 5
    type: ui
    source_rule: KIS-PIPE-003

fallback_policy:
  from: runtime-ai
  to: prompt-import
  when_reason_code: KISMET_ROUTE_UNAVAILABLE
  source_rule: KIS-PIPE-004

export_policy:
  trigger: explicit-user-action-only
  formats: [json, pdf, html]
  source_rule: KIS-PIPE-005
