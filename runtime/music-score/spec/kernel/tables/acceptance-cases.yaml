# Authoritative acceptance test cases for music-score mod
# Rule: MS-ACC-001 through MS-ACC-005

cases:
  - id: MS-ACC-001
    gate: Build and typecheck
    command: pnpm run typecheck && pnpm run build
    criteria: Exit code 0, no errors

  - id: MS-ACC-002
    gate: Unit tests
    command: pnpm run test
    criteria: All tests in test/*.test.ts pass

  - id: MS-ACC-003
    gate: Doctor validation
    command: pnpm run doctor
    criteria: Manifest alignment validated

  - id: MS-ACC-004
    gate: MusicXML correctness
    criteria:
      - Valid MusicXML 3.1 (XML well-formed, correct DTD reference)
      - Includes key signature, time signature, and tempo marking
      - Key-aware enharmonic spelling (sharps in sharp keys, flats in flat keys)
      - Generates <tie> and <tied> elements for cross-measure notes

  - id: MS-ACC-005
    gate: Export consistency
    criteria:
      - MIDI export uses quantized note timing (QuantizedScore.notes)
      - Not raw pitch detection output
      - Consistency with displayed MusicXML
