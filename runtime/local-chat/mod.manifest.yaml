id: world.nimi.local-chat
name: Local Chat
version: 1.0.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/local-chat/index.js
styles:
  - ./dist/mods/local-chat/index.css
description: >
  Adds hook-based local chat execution with chat-routing and read-only
  agent friend target loading for runtime local chat.
  This mod is optional and does not change host cloud routing defaults.
capabilities:
  - runtime.ai.text.generate
  - runtime.ai.text.stream
  - runtime.media.image.generate
  - runtime.media.video.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.stream
  - runtime.media.tts.synthesize
  - runtime.media.stt.transcribe
  - runtime.route.list.options
  - runtime.route.resolve
  - runtime.route.check.health
  - storage.sqlite.query
  - storage.sqlite.execute
  - data.register.data-api.local-chat.chat-targets.list
  - data.query.data-api.local-chat.chat-targets.list
  - data.register.data-api.local-chat.chat-target.detail
  - data.query.data-api.local-chat.chat-target.detail
  - data.register.data-api.local-chat.sessions.list
  - data.query.data-api.local-chat.sessions.list
  - data.register.data-api.local-chat.sessions.get
  - data.query.data-api.local-chat.sessions.get
  - data.register.data-api.local-chat.sessions.upsert
  - data.query.data-api.local-chat.sessions.upsert
  - data.register.data-api.local-chat.sessions.delete
  - data.query.data-api.local-chat.sessions.delete
  - data.query.data-api.core.social.friends-with-details.list
  - data.query.data-api.core.user.by-id.get
  - data.query.data-api.core.user.by-handle.get
  - data.query.data-api.core.world.by-id.get
  - data.query.data-api.core.worldview.by-id.get
  - data.query.data-api.core.agent.memory.recall.for-entity
  - data.query.data-api.core.agent.memory.core.list
  - data.query.data-api.core.agent.memory.e2e.list
  - data.query.data-api.core.agent.memory.stats.get
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - ui.register.ui-extension.runtime.devtools.panel
ai:
  consume:
    - chat
    - image
    - video
    - tts
    - stt
  profiles:
    - id: local-chat-default
      title: Default local chat stack
      description: Balanced multimodal local chat stack with Qwen3 TTS 1.7B.
      recommended: true
      consumeCapabilities:
        - chat
        - image
        - video
        - tts
        - stt
      entries:
        - entryId: local-chat/chat-qwen2.5-7b
          kind: asset
          capability: chat
          assetId: qwen2.5-7b-instruct
          assetKind: chat
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (default)
          required: true
          preferred: true
        - entryId: local-chat/image-z-image-turbo
          kind: asset
          capability: image
          assetId: local/z_image_turbo
          assetKind: image
          repo: jayn7/Z-Image-Turbo-GGUF
          engine: media
          title: Z-Image Turbo (GGUF)
          required: true
          preferred: true
        - entryId: local-chat/image-z-image-ae
          kind: asset
          capability: image
          assetId: local/z_image_ae
          assetKind: vae
          engineSlot: vae_path
          templateId: verified.asset.z_image.vae
          engine: media
          title: Z-Image AE VAE
          required: true
          preferred: true
        - entryId: local-chat/image-qwen3-4b-text-encoder
          kind: asset
          capability: image
          assetId: local/qwen3_4b
          assetKind: chat
          engineSlot: llm_path
          templateId: verified.asset.z_image.qwen3_4b
          engine: media
          title: Qwen3 4B Text Encoder
          required: true
          preferred: true
        - entryId: local-chat/video-generate-token-node
          kind: node
          capability: video
          nodeId: video.generate.cloud
          title: Video generation node
          required: true
        - entryId: local-chat/stt-local-node
          kind: node
          capability: stt
          nodeId: speech.stt.openai-compatible
          title: Local STT node
          required: true
        - entryId: local-chat/tts-qwen3-1.7b
          kind: service
          capability: tts
          serviceId: qwen-tts-python
          assetId: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
          assetKind: tts
          repo: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
          engine: qwen-tts-python
          title: Qwen3 TTS 1.7B (recommended)
          required: true
          preferred: true
    - id: local-chat-compact
      title: Compact local chat stack
      description: Lower-footprint multimodal local chat stack with Qwen3 TTS 0.6B.
      recommended: false
      consumeCapabilities:
        - chat
        - image
        - video
        - tts
        - stt
      entries:
        - entryId: local-chat/chat-qwen2.5-7b
          kind: asset
          capability: chat
          assetId: qwen2.5-7b-instruct
          assetKind: chat
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (default)
          required: true
          preferred: true
        - entryId: local-chat/image-z-image-turbo
          kind: asset
          capability: image
          assetId: local/z_image_turbo
          assetKind: image
          repo: jayn7/Z-Image-Turbo-GGUF
          engine: media
          title: Z-Image Turbo (GGUF)
          required: true
          preferred: true
        - entryId: local-chat/image-z-image-ae
          kind: asset
          capability: image
          assetId: local/z_image_ae
          assetKind: vae
          engineSlot: vae_path
          templateId: verified.asset.z_image.vae
          engine: media
          title: Z-Image AE VAE
          required: true
          preferred: true
        - entryId: local-chat/image-qwen3-4b-text-encoder
          kind: asset
          capability: image
          assetId: local/qwen3_4b
          assetKind: chat
          engineSlot: llm_path
          templateId: verified.asset.z_image.qwen3_4b
          engine: media
          title: Qwen3 4B Text Encoder
          required: true
          preferred: true
        - entryId: local-chat/video-generate-token-node
          kind: node
          capability: video
          nodeId: video.generate.cloud
          title: Video generation node
          required: true
        - entryId: local-chat/stt-local-node
          kind: node
          capability: stt
          nodeId: speech.stt.openai-compatible
          title: Local STT node
          required: true
        - entryId: local-chat/tts-qwen3-0.6b
          kind: service
          capability: tts
          serviceId: qwen-tts-python
          assetId: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
          assetKind: tts
          repo: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
          engine: qwen-tts-python
          title: Qwen3 TTS 0.6B
          required: true
          preferred: true
requires:
  - desktop-core-cloud-chat
