version: 1
source_rule: PS-ERR-001
codes:
  - code: PS_REFERENCE_IMAGE_MISSING
    category: setup
    blocking: true
    stage: gen-confirm-params
    user_hint: 项目未上传参考图，请先上传产品照片

  - code: PS_SCENE_IMAGE_LOAD_FAILED
    category: setup
    blocking: true
    stage: gen-select-scene
    user_hint: 场景图加载失败，请检查文件是否存在

  - code: PS_PROMPT_REFINE_FAILED
    category: ai
    blocking: false
    stage: prompt-ai-refine
    user_hint: AI 优化 prompt 失败，可手动编辑 prompt

  - code: PS_IMAGE_GENERATE_FAILED
    category: ai
    blocking: false
    stage: gen-execute
    user_hint: 图片生成失败，请稍后重试或更换模型

  - code: PS_IMAGE_GENERATE_TIMEOUT
    category: ai
    blocking: false
    stage: gen-execute
    user_hint: 图片生成超时，可尝试使用更快的模型

  - code: PS_BATCH_ALL_FAILED
    category: batch
    blocking: true
    stage: batch-summary
    user_hint: 批量任务全部失败，请检查模型连接和 prompt

  - code: PS_SELLING_POINTS_EMPTY
    category: setup
    blocking: false
    stage: prompt-mode-select
    user_hint: 未配置卖点，将自动切换到适用模式（不融入卖点）

  - code: PS_STORAGE_WRITE_FAILED
    category: storage
    blocking: true
    stage: "*"
    user_hint: 本地存储写入失败，请检查磁盘空间

  - code: PS_ROUTE_NO_IMAGE_PROVIDER
    category: route
    blocking: true
    stage: gen-execute
    user_hint: 未找到可用的图像生成服务，请在设置中配置

  - code: PS_NO_IMAGES_FOR_MULTIMODAL
    category: setup
    blocking: true
    stage: gen-confirm-params
    user_hint: 多模态模式需要至少附带一张图片
