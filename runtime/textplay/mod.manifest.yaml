id: world.nimi.textplay
name: TextPlay
version: 1.0.0
kind: capability-mod
icon: textplay
iconAsset: ./assets/icon.svg
entry: ./dist/mods/textplay/index.js
styles:
  - ./dist/mods/textplay/index.css
description: >
  Narrative text renderer mod for player-interactive story progression.
capabilities:
  - runtime.ai.text.generate
  - runtime.route.list.options
  - runtime.route.resolve
  - data.query.data-api.world.worlds.mine
  - data.query.data-api.world.events.list
  - data.query.data-api.world.lorebooks.list
  - data.query.data-api.world.scenes.list
  - data.query.data-api.world.narrative-contexts.list
  - data.query.data-api.world.spine.publish
  - data.query.data-api.creator.agents.list
  - data.query.data-api.core.agent.memory.recall.for-entity
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
  dependencies:
    required:
      - dependencyId: textplay/chat-default
        kind: model
        capability: chat
        engine: openai-compatible
        title: Default Chat Model (runtime-resolved)
    preferred:
      chat: textplay/chat-default
