version: 1
input_source:
  required: narrative_core_output_projection
  direct_prose_bypass_forbidden: true
  source_rule: T-FACT-001
fact_boundary:
  creates_or_rewrites_narrative_facts: false
  source_rule: T-FACT-004
projection_mapping:
  - from: CoreOutput.spineEvents
    to: RenderInput.events
    source_rule: T-FACT-003
  - from: CoreOutput.metrics
    to: RenderInput.metrics
    source_rule: T-FACT-003
  - from: TurnInput.triggerSource
    to: RenderInput.triggerSource
    source_rule: T-FACT-003
  - from: TurnInput.userMessage
    to: RenderInput.userMessage
    source_rule: T-FACT-003
  - from: orchestration_context
    to: player|scene|agent|worldStyle
    source_rule: T-FACT-003
  - from: CoreOutput.spineEvents[*].type
    to: RenderInput.events[*].type
    source_rule: T-FACT-005
  - from: CoreOutput.spineEvents[*].payload
    to: RenderInput.events[*].payload
    source_rule: T-FACT-005
  - from: CoreOutput.metrics.tension
    to: RenderInput.pacingContext
    source_rule: T-FACT-006
constraints:
  tolerant_projection_shadow_diagnostics_required: true
  malformed_non_critical_projection_branches_may_degrade_to_empty_values: true
  required_story_and_turn_identity_fields_fail_close: true
  source_rule: T-FACT-007
