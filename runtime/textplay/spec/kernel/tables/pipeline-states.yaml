version: 1
execution_chain:
  - step: received
    order: 1
    source_rule: T-PIPE-001
  - step: normalize
    order: 2
    source_rule: T-PIPE-001
  - step: filter-visibility
    order: 3
    source_rule: T-PIPE-001
  - step: build-prompt
    order: 4
    source_rule: T-PIPE-001
  - step: generate
    order: 5
    source_rule: T-PIPE-001
  - step: wrap-output
    order: 6
    source_rule: T-PIPE-001
  - step: persist-best-effort
    order: 7
    source_rule: T-PIPE-001
states:
  - state: RECEIVED
    preconditions:
      - render_input_schema_valid
    next: NORMALIZE
    source_rule: T-PIPE-002
  - state: NORMALIZE
    preconditions:
      - input_available
    next: FILTER_VISIBILITY
    source_rule: T-PIPE-002
  - state: FILTER_VISIBILITY
    preconditions:
      - events_normalized
    next: BUILD_PROMPT
    source_rule: T-PIPE-002
  - state: BUILD_PROMPT
    preconditions:
      - visible_events_ready
      - prompt_language_resolved
      - story_language_resolved
    next: GENERATE
    source_rule: T-PIPE-002
  - state: GENERATE
    preconditions:
      - route_available
    next: WRAP_OUTPUT
    source_rule: T-PIPE-002
  - state: WRAP_OUTPUT
    preconditions:
      - generated_text_non_empty
      - meta_complete
    next: RETURNED
    source_rule: T-PIPE-003
persist:
  on_rendered_provided_required: true
  failure_behavior: warn-nonblocking
  source_rule: T-PIPE-004
language_governance:
  prompt_language:
    source: active_ui_locale
    supported_locales:
      - en
      - zh
    fallback: en
    source_rule: T-PIPE-005
  story_language:
    resolution_point: start_only
    priority:
      - world_primary_language
      - agent_language
      - prompt_language
    supported_locales:
      - en
      - zh
    reuse_on:
      - resume
      - restart
      - draft-switch
    source_rule: T-PIPE-005
  output_lock:
    prompt_shell_language_follows_prompt_language: true
    player_facing_narrative_must_follow_story_language: true
    source_rule: T-PIPE-006
