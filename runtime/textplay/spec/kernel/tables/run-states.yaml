version: 1
lifecycle_states:
  - state: RUNNING
    allowed_next:
      - PAUSE_REQUESTED
      - CANCEL_REQUESTED
      - FAILED
      - COMPLETED
    source_rule: T-RUN-001
  - state: PAUSE_REQUESTED
    allowed_next:
      - PAUSED
      - RUNNING
      - FAILED
    source_rule: T-RUN-001
  - state: PAUSED
    allowed_next:
      - RUNNING
      - CANCEL_REQUESTED
      - FAILED
    source_rule: T-RUN-001
  - state: CANCEL_REQUESTED
    allowed_next:
      - CANCELED
      - FAILED
    source_rule: T-RUN-001
  - state: CANCELED
    terminal: true
    source_rule: T-RUN-001
  - state: FAILED
    terminal: true
    source_rule: T-RUN-001
  - state: COMPLETED
    terminal: true
    source_rule: T-RUN-001
event_envelope:
  required_fields:
    - traceId
    - runId
    - stage
    - step
    - seq
    - attempt
    - eventType
    - timestamp
  source_rule: T-RUN-002
run_task_identity:
  run_id_and_task_id_must_be_distinct: true
  binding_fields:
    - runId
    - taskId
    - workflowType
  source_rule: T-RUN-006
persist_semantics:
  persist_best_effort_non_blocking: true
  warn_reason_code_required: true
  source_rule: T-RUN-003
resume_validation:
  checkpoint_hash_must_match: true
  replay_side_effects_must_be_idempotent: true
  source_rule: T-RUN-004
retry_classes:
  - class: retryable
    examples:
      - route_unavailable
      - provider_timeout
      - transient_parse_error
    source_rule: T-RUN-005
  - class: non-retryable
    examples:
      - projection_contract_violation
      - pov_visibility_violation
    source_rule: T-RUN-005
cancel_terminal_semantics:
  terminal_status: CANCELED
  terminal_event_type: run.canceled
  cancel_must_not_emit_run_error: true
  source_rule: T-RUN-007
recovery_feed:
  incremental_pull_required: true
  incremental_query_fields:
    - afterSeq
    - limit
  gap_refill_required_before_apply: true
  source_rule: T-RUN-008
