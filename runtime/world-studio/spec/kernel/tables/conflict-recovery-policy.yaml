version: 1
optimistic_concurrency:
  maintenance_save_uses_if_snapshot_version_by_default: true
  sync_events_uses_if_snapshot_version_by_default: true
  force_override_supported_for_maintenance_and_sync_events: true
  backend_conflict_marker: WORLD_MAINTENANCE_VERSION_CONFLICT
  mapped_reason_code: WORLD_STUDIO_MAINTENANCE_CONFLICT
  source_rule: WS-CONFLICT-001
conflict_mapping:
  maintenance_save_conflict_message: "WORLD_STUDIO_MAINTENANCE_CONFLICT: remote version changed. Use Reload Remote or Force Save."
  sync_events_conflict_message: "WORLD_STUDIO_MAINTENANCE_CONFLICT: event graph is stale. Use Reload Remote or Force Sync Events."
  source_rule: WS-CONFLICT-002
reload_remote:
  refetch_queries:
    - maintenance
    - events
    - lorebooks
    - mutations
  replace_local_unsaved_snapshot: true
  reset_unsaved_changes_flags:
    - world
    - worldview
    - events
    - lorebooks
  update_editor_snapshot_version_from_remote: true
  source_rule: WS-CONFLICT-003
task_reload_recovery:
  recover_live_statuses:
    - RUNNING
    - PAUSE_REQUESTED
    - PAUSED
    - CANCEL_REQUESTED
  resumable_task_target_state: PAUSED
  non_resumable_task_target_state: FAILED
  non_resumable_error_code: WORLD_STUDIO_TASK_RECOVERY_INTERRUPTED
  source_rule: WS-CONFLICT-004
recover_event_emission:
  emit_event_name: recover
  emit_when_status_is_paused_and_message_contains: Recovered after reload
  emit_once_per_task_id: true
  source_rule: WS-CONFLICT-005
adopt_remote_snapshot:
  operation: onAdoptRemoteSnapshot
  behavior: align_editor_snapshot_version_without_overwriting_local_fields
  source_rule: WS-CONFLICT-003
