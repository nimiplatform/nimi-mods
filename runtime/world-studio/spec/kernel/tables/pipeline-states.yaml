version: 1
landing_modes:
  - mode: NO_ACCESS
    description: User has no active world scope.
    source_rule: WS-PIPE-001
  - mode: CREATE
    description: User creates/edits draft pipeline.
    source_rule: WS-PIPE-001
  - mode: MAINTAIN
    description: User edits published world maintenance state.
    source_rule: WS-PIPE-001
create_step_chain:
  - step: SOURCE
    order: 1
    source_rule: WS-PIPE-002
  - step: INGEST
    order: 2
    source_rule: WS-PIPE-002
  - step: EXTRACT
    order: 3
    source_rule: WS-PIPE-002
  - step: CHECKPOINTS
    order: 4
    source_rule: WS-PIPE-002
  - step: SYNTHESIZE
    order: 5
    source_rule: WS-PIPE-002
  - step: DRAFT
    order: 6
    source_rule: WS-PIPE-002
  - step: PUBLISH
    order: 7
    source_rule: WS-PIPE-002
distill_stage_chain:
  - stage: INGEST
    order: 1
    source_rule: WS-PIPE-003
  - stage: COARSE
    order: 2
    source_rule: WS-PIPE-003
  - stage: FINE
    order: 3
    source_rule: WS-PIPE-003
  - stage: MERGE
    order: 4
    source_rule: WS-PIPE-003
  - stage: CHECKPOINTS
    order: 5
    source_rule: WS-PIPE-003
  - stage: SYNTHESIZE
    order: 6
    source_rule: WS-PIPE-003
  - stage: DRAFT
    order: 7
    source_rule: WS-PIPE-003
  - stage: PUBLISH
    order: 8
    source_rule: WS-PIPE-003
parse_job_phases:
  - idle
  - ingest
  - extract
  - merge
  - synthesize
  - validate
  - done
  - failed
phase1_retry_policy:
  retry_mode_enum:
    - all
    - failed
  retry_scope_enum:
    - all
    - json
    - coarse
    - fine
  failed_retry_must_preserve_logical_chunk_index: true
  failed_retry_supports_error_code_filter: true
  auto_shrink_retry_on_context_overflow: true
  source_rule: WS-PIPE-004
phase1_fine_patch_contract:
  partial_patch_allowed: true
  noop_patch_allowed: true
  missing_fields_semantic: omit_means_noop
  top_level_outputs:
    - extraction
    - draftPatch
  draft_patch_prose_fields:
    world:
      - description
      - tagline
      - motto
      - overview
    agents:
      - scenario
      - greeting
      - exampleDialogue
      - systemPromptBase
  draft_patch_prose_value_shape:
    required:
      - content
      - confidence
    optional:
      - evidenceRefs
  program_routes_prose_patch_to:
    - working_prose
    - candidate_pool
  working_prose_admission:
    confidence_min: 0.75
    evidence_refs_min: 1
    short_fields_min_chars: 8
    long_fields_min_chars: 30
  prose_candidates:
    program_decides_operations: true
    operation_enum:
      - create
      - revise
      - replace
      - no-op
    per_field_active_limit: 3
  accumulator_slice_includes_working_prose: true
  accumulator_slice_excludes_prose_candidates: true
  source_rule: WS-PIPE-010
phase1_temporal_normalization:
  position: after_global_refine_before_quality_gate
  reuses_temporal_order_engine: true
  rewrites:
    - events.primary
    - events.secondary
    - timelineSeq
    - timeline
  downstream_consumers:
    - quality_gate
    - start_time_options
  source_rule: WS-PIPE-015
phase2_preconditions:
  required:
    - quality_gate_status_not_block
    - selected_start_time_id_present
    - selected_characters_non_empty
    - primary_events_non_empty
    - non_future_primary_evidence_coverage_above_threshold
  evidence_gate_scope: PRIMARY_AND_EVENT_HORIZON_NOT_FUTURE
  fail_reason_codes:
    - WORLD_STUDIO_PHASE1_QUALITY_GATE_BLOCKED
    - WORLD_STUDIO_START_TIME_PROJECTION_FAILED
    - WORLD_STUDIO_CHARACTER_SELECTION_INVALID
    - WORLD_STUDIO_EVENT_GRAPH_INVALID
    - WORLD_STUDIO_EVENT_EVIDENCE_REQUIRED
  source_rule: WS-PIPE-005
phase2_round_policy:
  rounds:
    - round: produce
      output_mode: full_draft
    - round: enrich
      output_mode: sparse_patch
      contract: enrichment_patch_only
    - round: audit
      output_mode: full_draft
  round_partition_rule: purpose_not_content
  round2_patch_merge_mode: additive_by_identity
  prose_input_priority:
    - working_prose
    - candidate_pool
    - model_gap_fill
  round1_must_start_from_working_prose: true
  round3_must_write_final_prose_back_to_working_prose: true
  source_rule: WS-PIPE-011
phase2_weak_field_report:
  generated_by: program
  thresholds:
    prose_min_chars: 50
    structural_summary_min_chars: 30
    list_min_items: 2
  reason_enum:
    - empty
    - low_information
    - low_evidence
    - incomplete_reference
  source_rule: WS-PIPE-012
phase2_retry_policy:
  compact_retry_on:
    - timeout_like_error
    - json_object_parse_failure
  stage_local_transient_retry:
    coarse: 1
    fine: 1
    phase2_each_round_stage: 1
  no_outer_retry_wrapper: true
  source_rule: WS-PIPE-013
phase2_realm_alignment:
  world_patch_contract: WorldPatchDto
  worldview_patch_contract: WorldviewPatchDto
  agent_payload_contract: creator-agent-canonical
  narrative_arc_build_logic_unchanged: true
  source_rule: WS-PIPE-014
phase2_degraded_enrich:
  round1_failure: fail_generate
  round2_failure: continue_to_round3_with_round1_state
  round3_failure: fail_generate
  persist_as_draft_quality_state: true
  draft_quality_fields:
    - worldCutStatus
    - enrichStatus
    - enrichFailureReason
    - weakFieldIssues
  round3_degraded_audit_scope:
    - consistency
    - realm_whitelist
    - basic_tone_style_unification
  empty_fields_in_degraded_mode: allowed
  weak_field_report_in_degraded_mode: advisory_only
  quality_state_persists_across_reload: true
  quality_state_preserved_across_failed_generate_retries: true
  quality_state_cleared_on_next_successful_generate: true
  success_target: REVIEW
  creator_decides_continue_after_manual_edit: true
  source_rule: WS-PIPE-016
maintain_operations:
  - operation: save-maintenance
    optimistic_concurrency: true
    source_rule: WS-PIPE-006
  - operation: sync-events
    mode_enum:
      - merge
      - replace
    optimistic_concurrency: true
    source_rule: WS-PIPE-006
  - operation: sync-lorebooks
    optimistic_concurrency: false
    source_rule: WS-PIPE-006
  - operation: reload-remote
    replaces_unsaved_state: true
    source_rule: WS-PIPE-006
publish_flow:
  require_selected_draft_id: true
  require_world_and_worldview_minimum_shape: true
  post_publish_landing_target: MAINTAIN
  agent_sync_ownership_type: WORLD_OWNED
  source_rule: WS-PIPE-007
narrative_handoff_projection:
  required: true
  required_fields:
    - worldId
    - worldVersion
    - eventId
    - eventType
    - temporalAnchor
    - sourceEventIds
    - traceId
  fail_reason_code: WORLD_STUDIO_NARRATIVE_HANDOFF_INVALID
  source_rule: WS-PIPE-008
story_projection_summary:
  required: true
  source_from:
    - publish_result.storyProjectionStats
    - maintenance_payload.storyProjectionSummary
  required_fields:
    - storyCount
    - missingContextCount
    - latestProjectedAt
  projection_rules:
    - PRIMARY-event-only
    - stable-story-id-by-world-event
  source_rule: WS-PIPE-009
