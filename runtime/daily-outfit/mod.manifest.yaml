id: world.nimi.daily-outfit
name: Daily Outfit
version: 1.0.0
kind: capability-mod
icon: daily-outfit
entry: ./dist/mods/daily-outfit/index.js
styles:
  - ./dist/mods/daily-outfit/index.css
description: >
  AI-assisted wardrobe organization and outfit planning with local-first
  profile, outfit history, and closet insights.
capabilities:
  - runtime.ai.text.generate
  - runtime.ai.text.stream
  - runtime.ai.image.analyze
  - runtime.ai.image.generate
  - data.register.data-api.daily-outfit.wardrobe.list
  - data.register.data-api.daily-outfit.wardrobe.get
  - data.register.data-api.daily-outfit.wardrobe.create
  - data.register.data-api.daily-outfit.wardrobe.update
  - data.register.data-api.daily-outfit.wardrobe.retire
  - data.register.data-api.daily-outfit.outfits.list
  - data.register.data-api.daily-outfit.outfits.get
  - data.register.data-api.daily-outfit.outfits.favorites
  - data.register.data-api.daily-outfit.profile.read
  - data.register.data-api.daily-outfit.profile.write
  - data.register.data-api.daily-outfit.insights.query
  - data.register.data-api.daily-outfit.wearlog.list
  - data.register.data-api.daily-outfit.wearlog.create
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
    - image
  dependencies:
    required: []
    optional: []
