version: 1
mod_identity:
  mod_id: world.nimi.daily-outfit
  name: Daily Outfit
  entry: ./dist/mods/daily-outfit/index.js
  source_rule: DO-CAP-001
required_capabilities:
  - key: runtime.ai.text.generate
    purpose: 场景分析、衣物分类辅助、搭配推荐逻辑
    source_rule: DO-CAP-005
  - key: runtime.ai.text.stream
    purpose: 流式输出推荐理由
    source_rule: DO-CAP-005
  - key: runtime.media.image.generate
    purpose: 虚拟试穿图生成
    source_rule: DO-CAP-004
  - key: runtime.route.list.options
    purpose: 注册本地路由候选项
    source_rule: DO-CAP-001
  - key: runtime.route.resolve
    purpose: 将用户意图解析为 mod 内路由
    source_rule: DO-CAP-001
  - key: storage.sqlite.query
    purpose: 查询本地衣橱状态
    source_rule: DO-CAP-006
  - key: storage.sqlite.execute
    purpose: 持久化本地衣橱状态到宿主 sqlite
    source_rule: DO-CAP-006
  - key: storage.files.read
    purpose: 读取本地自拍、衣物图与试穿图文件引用
    source_rule: DO-CAP-006
  - key: storage.files.write
    purpose: 写入本地自拍、衣物图与试穿图文件引用
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wardrobe.list
    purpose: 查询衣橱列表
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wardrobe.get
    purpose: 查询单件衣物详情
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wardrobe.create
    purpose: 新增衣物
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wardrobe.update
    purpose: 更新衣物信息
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wardrobe.retire
    purpose: 淘汰衣物（软删除）
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.outfits.list
    purpose: 查询穿搭方案列表
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.outfits.get
    purpose: 查询单个方案详情
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.outfits.favorites
    purpose: 查询收藏方案
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.profile.read
    purpose: 读取用户画像
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.profile.write
    purpose: 写入用户画像
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.insights.query
    purpose: 查询衣橱洞察
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wearlog.list
    purpose: 查询穿搭日志列表
    source_rule: DO-CAP-006
  - key: data.register.data-api.daily-outfit.wearlog.create
    purpose: 创建穿搭日志
    source_rule: DO-CAP-006
  - key: ui.register.ui-extension.app.sidebar.mods
    purpose: 侧边栏导航入口
    source_rule: DO-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    purpose: 主内容路由页面
    source_rule: DO-CAP-001
allowed_sdk_surfaces:
  - package: '@nimiplatform/sdk/mod'
    apis:
      - createModRuntimeClient
      - ai.text.generate
      - ai.text.stream
      - ai.image.analyze
      - ai.image.generate
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod/shell'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod/lifecycle'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: DO-CAP-002
  - package: '@nimiplatform/sdk/mod'
    source_rule: DO-CAP-002
forbidden_patterns:
  - pattern: sdk-mod-host-direct-import
    reason: 绕过稳定 mod SDK 边界
    source_rule: DO-CAP-002
  - pattern: provider-private-vision-http
    reason: 绕过视觉能力治理
    source_rule: DO-CAP-003
  - pattern: provider-private-image-gen-http
    reason: 绕过图像生成能力治理
    source_rule: DO-CAP-004
