version: 1
mod_identity:
  mod_id: world.nimi.mint-you
  name: Mint-You
  kind: capability-mod
  entry: ./dist/mods/mint-you/index.js
  source_rule: MY-CAP-001

required_capabilities:
  # Creation flow
  - key: runtime.ai.text.generate
    purpose: Structured DNA synthesis and Identity Card generation from trait scores
    source_rule: MY-CAP-003
  - key: data.query.data-api.creator.agents.create
    purpose: Create agent with pre-built DNA payload
    source_rule: MY-CAP-004
  - key: data.query.data-api.world.access.me
    purpose: Resolve current user access summary for session scope key
    source_rule: MY-CAP-002
  - key: data.query.data-api.world.oasis.get
    purpose: Resolve deterministic OASIS world target for agent worldId binding
    source_rule: MY-CAP-002
  - key: runtime.route.list.options
    purpose: Query runtime route source/connector/model options for Mint-You synthesis routing controls
    source_rule: MY-CAP-003
  # Photo trust
  - key: runtime.profile.read.agent
    purpose: Intercept agent profile reads to filter referenceImageUrl based on photo authorization state
    source_rule: MY-CAP-005
  - key: storage.sqlite.query
    purpose: Query host-provided mod storage state for intake progress and photo authorization through the stable storage facade
    source_rule: MY-CAP-002
  - key: storage.sqlite.execute
    purpose: Persist intake session progress and photo authorization state through the host-provided mod storage facade
    source_rule: MY-CAP-002
  # UI registration
  - key: ui.register.ui-extension.app.sidebar.mods
    purpose: Sidebar navigation entry
    source_rule: MY-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    purpose: Content routes for intake flow and photo management UI
    source_rule: MY-CAP-001

minimal_permission_policy:
  wildcard_forbidden: true
  capability_addition_requires_spec_update: true
  source_rule: MY-CAP-002
