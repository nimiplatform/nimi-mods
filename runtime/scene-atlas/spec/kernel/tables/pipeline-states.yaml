version: 1
pipeline:
  name: scene-atlas-flow
  steps:
    - step: image-import
      order: 1
      type: user-input
      description: import a single source image into the current working context
      source_rule: SA-PIPE-001
    - step: pack-draft-ensure
      order: 2
      type: deterministic
      description: implicitly create or reuse the current ScenePack draft after image import
      source_rule: SA-PIPE-001
    - step: style-preselect
      order: 3
      type: deterministic
      description: preselect a recommended style; reuse locked pack defaultStyle when the pack already owns SceneCards
      source_rule: SA-PIPE-002
    - step: style-adjust
      order: 4
      type: user-input
      description: user may accept recommended style, switch preset style, or add an optional custom style note before generation
      source_rule: SA-PIPE-002
    - step: scene-generate
      order: 5
      type: generation
      description: explicit Generate Scene action creates one SceneCard and inserts it into the current ScenePack
      source_rule: SA-PIPE-001
    - step: card-curate
      order: 6
      type: user-input
      description: user may edit generated text fields, regenerate, or remove the current SceneCard
      source_rule: SA-PIPE-003
    - step: repeat-or-stop
      order: 7
      type: user-input
      description: user may add another image into the current pack or stop and curate pack metadata
      source_rule: SA-PIPE-001

style_policy:
  recommended_style_exists_before_first_generation: true
  default_style_persisted_on_first_successful_generation: true
  style_lock_trigger: any-scene-card-exists
  style_unlock_condition: no-scene-cards-exist
  source_rule: SA-PIPE-002

result_policy:
  auto_generation_on_import: false
  generation_unit: one-image-to-one-scene-card
  history_retention: replace-current-result-only
  source_rule: SA-PIPE-003

publish_readiness:
  required_fields: [ownerId, title, description, coverImage, defaultStyle, tags]
  required_min_scene_cards: 1
  readiness_outputs: [isReady, readinessIssues]
  publish_unit: scene-pack
  source_rule: SA-PIPE-004

empty_draft_cleanup:
  retain_while_context_open: true
  delete_on_context_exit: true
  source_rule: SA-PIPE-005

published_edit_policy:
  scene_pack_editable_after_publish: true
  asset_editable_in_scene_atlas: false
  source_rule: SA-PIPE-006
