id: world.nimi.videoplay
name: VideoPlay
version: 1.1.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/videoplay/index.js
styles:
  - ./dist/mods/videoplay/index.css
description: >
  Episode-based narrative video production workbench.
  Consumes canonical narrative windows and outputs publish-ready release packages.
capabilities:
  - runtime.ai.text.generate
  - runtime.media.image.generate
  - runtime.media.video.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.synthesize
  - runtime.route.list.options
  - runtime.route.resolve
  - runtime.route.check.health
  - storage.sqlite.query
  - storage.sqlite.execute
  - data.query.data-api.world.events.list
  - data.query.data-api.world.lorebooks.list
  - data.query.data-api.world.scenes.list
  - data.query.data-api.world.narrative-contexts.list
  - data.query.data-api.core.agent.memory.recall.for-entity
  - data.register.data-api.videoplay.episode.upsert
  - data.query.data-api.videoplay.episode.upsert
  - data.register.data-api.videoplay.asset.batch-upsert
  - data.query.data-api.videoplay.asset.batch-upsert
  - data.register.data-api.videoplay.release.publish
  - data.query.data-api.videoplay.release.publish
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
    - image
    - video
    - tts
  profiles:
    - id: videoplay-default
      title: Default production stack
      description: Runtime-resolved default stack for chat, image, video, and TTS generation.
      recommended: true
      consumeCapabilities:
        - chat
        - image
        - video
        - tts
      entries:
        - entryId: videoplay/chat-default
          kind: asset
          capability: chat
          assetKind: chat
          engine: openai-compatible
          title: Default Chat Model (runtime-resolved)
          required: true
          preferred: true
        - entryId: videoplay/image-default
          kind: asset
          capability: image
          assetKind: image
          engine: openai-compatible
          title: Default Image Model (runtime-resolved)
          required: true
          preferred: true
        - entryId: videoplay/video-default
          kind: asset
          capability: video
          assetKind: video
          engine: openai-compatible
          title: Default Video Model (runtime-resolved)
          required: true
          preferred: true
        - entryId: videoplay/tts-default
          kind: asset
          capability: tts
          assetKind: tts
          engine: openai-compatible
          title: Default TTS Model (runtime-resolved)
          required: true
          preferred: true
