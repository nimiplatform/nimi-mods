version: 1
patterns:
  - id: V-FORBID-001
    pattern: mod-direct-vendor-api
    description: Mod direct vendor API call is forbidden.
    enforcement: hard-block
    source_rule: V-ROUTE-005
  - id: V-FORBID-002
    pattern: model-name-capability-guess
    description: Inferring capability from model name is forbidden.
    enforcement: hard-block
    source_rule: V-ROUTE-006
  - id: V-FORBID-003
    pattern: hardcoded-capability-branch
    description: Business branch hardcoding runtime capability is forbidden.
    enforcement: hard-block
    source_rule: V-ROUTE-007
  - id: V-FORBID-004
    pattern: renderer-write-narrative-spine
    description: Renderer writing narrative spine is forbidden.
    enforcement: hard-block
    source_rule: V-FACT-002
  - id: V-FORBID-005
    pattern: bypass-canonical-core-output
    description: Bypassing canonical CoreOutput projection is forbidden.
    enforcement: hard-block
    source_rule: V-FACT-003
  - id: V-FORBID-006
    pattern: skip-quality-gate-to-release
    description: Release package without quality gate pass is forbidden.
    enforcement: hard-block
    source_rule: V-QC-002
  - id: V-FORBID-007
    pattern: use-story-package-supplementary-input-as-grounding
    description: World/context/memory supplementary fields cannot replace canonical sourceEventIds grounding.
    enforcement: hard-block
    source_rule: V-FACT-006
