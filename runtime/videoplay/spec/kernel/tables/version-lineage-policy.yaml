version: 1
version_event_required_fields:
  fields:
    - versionId
    - parentVersionId
    - branchId
    - operationType
    - deltaSummary
    - operator
    - timestamp
  source_rule: V-LINEAGE-001
branch_policy:
  undo_scope: current-branch-only
  redo_scope: current-branch-only
  source_rule: V-LINEAGE-002
merge_policy:
  conflict_record_required: true
  merge_resolution_audit_required: true
  source_rule: V-LINEAGE-003
history_policy:
  lineage_append_only: true
  rewrite_existing_nodes_forbidden: true
  source_rule: V-LINEAGE-004
