version: 1
cases:
  - id: AC-001-IMPLICIT-DRAFT-ON-FIRST-INPUT
    description: Providing the first valid character input implicitly creates an AgentDraft; text alone is sufficient, while reference image remains optional.
    expected_ok: true
    source_rule: AC-ACC-001

  - id: AC-002-NO-AUTO-GENERATE-ON-INPUT
    description: Input alone does not trigger image/text generation; Generate Agent must be explicit.
    expected_ok: true
    source_rule: AC-ACC-001

  - id: AC-003-ONE-GENERATE-ONE-CURRENT-RESULT
    description: One explicit Generate Agent action produces exactly one current generatedImage and one current text result set.
    expected_ok: true
    source_rule: AC-ACC-001

  - id: AC-004-FEELING-LED-NOT-QUESTIONNAIRE
    description: The capture flow advances through feeling-led dialogue rather than a questionnaire-style required-field checklist.
    expected_ok: true
    source_rule: AC-ACC-002

  - id: AC-005-STYLE-HINT-OPTIONAL
    description: Support inputs such as reference image and selected existing agent remain optional; leaving them empty does not block generation.
    expected_ok: true
    source_rule: AC-ACC-002

  - id: AC-006-REGENERATE-REPLACES-CURRENT-RESULT
    description: Regenerate replaces the current generatedImage and text result set instead of appending candidate history.
    expected_ok: true
    source_rule: AC-ACC-004

  - id: AC-007-VISIBLE-FIELDS-EDITABLE-WITHOUT-REGENERATE
    description: Editing name, bio, or tags does not auto-trigger image regeneration.
    expected_ok: true
    source_rule: AC-ACC-004

  - id: AC-008-PERSONA-SEED-NOT-DIRECTLY-EDITABLE
    description: personaSeed is not directly exposed as a first-version editable field.
    expected_ok: true
    source_rule: AC-ACC-004

  - id: AC-009-SAVE-DOES-NOT-AUTO-HANDOFF
    description: Saving the draft does not automatically hand it off to Forge.
    expected_ok: true
    source_rule: AC-ACC-005

  - id: AC-010-HANDOFF-FAILURE-KEEPS-LOCAL-DRAFT
    description: When explicit Forge handoff fails, the local AgentDraft remains intact.
    expected_ok: false
    reason_code: AC_HANDOFF_FAILED
    source_rule: AC-ACC-005

  - id: AC-011-EMPTY-DRAFT-DELETES-ON-EXIT
    description: An empty draft may remain temporarily while the current context is open, but deletes on context exit.
    expected_ok: true
    source_rule: AC-ACC-005

  - id: AC-012-BRIEF-CONFIRM-BEFORE-GENERATE
    description: Clicking Generate Agent first yields one natural-language brief confirmation message inside the conversation flow before actual generation.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-013-BRIEF-NOT-DIRECTLY-EDITABLE
    description: The user does not directly edit the brief text; correcting the brief happens by continuing the conversation and letting the system restate it.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-014-SELECTED-AGENT-IS-AUXILIARY-CONTEXT
    description: A selected existing agent acts only as auxiliary context and does not override current user input.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-015-INPUT-PRIORITY-OVER-SELECTED-AGENT
    description: When selected agent background conflicts with the current user input, the current user input wins for the next brief and generation direction.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-016-CONTEXT-CHANGE-RECOMPUTES-BRIEF
    description: Adding, replacing, or removing the selected existing agent counts as input change and recomputes the current brief.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-017-EFFECTIVE-USER-INTENT-NOT-LAST-MESSAGE
    description: The current user input is the set of still-effective user intents in the session, not merely the last message.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-018-CONFLICTING-NEW-INPUT-OVERRIDES-OLD-INTENT
    description: New user input that conflicts with prior intent overrides the older intent in the next brief.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-019-EXISTING-AGENT-BACKGROUND-USES-DATA-QUERY-SURFACE
    description: Selecting an existing agent uses declared SDK/host data query capabilities rather than ad hoc Realm access or raw request assembly.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-020-GENERATION-USES-CURRENT-CONTEXT
    description: Each generation uses the current generation context rather than mechanically replaying the full raw history.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-027-FEELING-ANCHOR-CARRIES-STABLE-SENSE
    description: The current role feel is carried forward through a structured feeling anchor with core vibe, stable tone phrases, and avoid-vibe cues instead of living only in raw dialogue text.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-028-GENERATION-CONSUMES-STATE-BUNDLE
    description: Formal generation consumes a current state bundle such as feeling anchor, working memory, brief, visual spec, and latest delta, rather than directly consuming chronological raw dialogue history.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-029-DEVIATION-CORRECTS-THROUGH-NEXT-DIALOGUE
    description: If a generated result still feels off, correction happens through the next user dialogue turn and a newly formed brief rather than a hidden automatic post-generation correction round.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-021-LATEST-CORRECTION-IS-DELTA-BY-DEFAULT
    description: New correction input is treated as a delta on the current direction unless the user explicitly indicates a reset.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-022-WHEN-PRESENT-GENERATED-IMAGE-JOINS-NEXT-CONTEXT
    description: When a current generatedImage already exists, it may join the next generation context as directional context, but the system should avoid recursively feeding its image bytes back into the next formal image request by default.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-023-RESULT-INCLUDES-CHARACTER-READOUT
    description: Each current result includes a lightweight character readout that reflects the current role feel and direction of change.
    expected_ok: true
    source_rule: AC-ACC-003

  - id: AC-024-DEFAULT-RESULT-USES-STABLE-FULL-BODY-ANCHOR-FRAMING
    description: The default formal image result is framed as a stable full-body character anchor image with fixed-focal-length tendency, clear subject, weak background, and no exaggerated perspective or dramatic shot language.
    expected_ok: true
    source_rule: AC-ACC-004

  - id: AC-025-DIALOGUE-PRIORITIZES-CHARACTER-DETAILS-OVER-BACKGROUND
    description: The default capture dialogue prioritizes character-facing details such as silhouette, outfit, materials, accessories, handheld props, and art style, while treating background as supporting-only unless explicitly requested.
    expected_ok: true
    source_rule: AC-ACC-002

  - id: AC-026-PROMPT-AND-LLM-OUTPUT-FOLLOW-DESKTOP-LOCALE
    description: Prompt shell language and LLM output language follow the current desktop system language; zh desktop locales use zh, and every other locale falls back to en by default.
    expected_ok: true
    source_rule: AC-ACC-002

verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:agent-capture-kernel-docs
    source_rule: AC-ACC-004
  - command: pnpm -C nimi-mods run check:spec:agent-capture-kernel-docs-drift
    source_rule: AC-ACC-004
  - command: pnpm -C nimi-mods run check:spec:agent-capture-kernel-consistency
    source_rule: AC-ACC-004
