version: 1
entities:
  - entity: AgentDraft
    source_rule: AC-DOM-001
    description: 对话式角色捕捉的私有工作态草稿。
    fields:
      - name: id
        type: ULID
        required: true
        description: 唯一标识
      - name: status
        type: enum
        required: true
        values: [draft, archived]
        description: 工作态生命周期状态
      - name: sourceImage
        type: ImageRef
        required: false
        description: 可选参考图输入；文字输入已可单独满足最小生成条件，参考图用于补充当前角色形象方向
      - name: sourcePrompt
        type: string
        required: false
        description: 用户累计角色描述文本；由多轮用户输入逐步展开，单独存在即可满足最小生成条件，也是角色捕捉的一等入口。默认应优先沉淀人物主体、服装、材质、配饰、手持道具与画风，而不是把背景场景当作主收敛目标
      - name: feelingAnchor
        type: object
        required: false
        description: 当前稳定感觉锚点，至少包含 coreVibe、tonePhrases 与 avoidVibe；用于把用户感觉沉淀为可持续打磨的结构化状态
      - name: selectedAgentId
        type: ULID
        required: false
        description: 用户显式选择的已有 agent 作为辅助背景上下文；不构成必须逐条兑现的完整生成约束
      - name: generatedImage
        type: ImageRef
        required: false
        description: 当前正式图像结果；默认应为采用固定焦距倾向、主体清晰、视角稳定、全身完整入画、适合后续角色制作继续使用的角色锚点图。人物主体上的服装、材质、配饰、手持道具与画风应优先被稳定落实，背景只承担辅助氛围角色。一次显式生成只产出一个当前结果，并可在后续生成中作为参考上下文的一部分
      - name: characterReadout
        type: string
        required: false
        description: 当前结果配套的轻量角色读取文本，用于表达当前角色感觉与本轮方向变化
      - name: name
        type: string
        required: false
        description: 角色名称草稿；生成后允许用户编辑
      - name: bio
        type: string
        required: false
        description: 角色简介草稿；生成后允许用户编辑
      - name: personaSeed
        type: string
        required: false
        description: 系统整理后的人设种子文本；第一版不直接开放手改
      - name: tags
        type: string[]
        required: false
        description: 角色检索与风格标签；生成后允许用户编辑
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
    notes:
      - AgentDraft 是 mod 私有 working state，不是 canonical agent
      - 保存 draft 不要求立即 handoff
      - 空 draft 可临时存在，但离开上下文后应自动清理
      - selectedAgentId 仅作为辅助上下文；当前会话中的用户输入始终优先
      - sourcePrompt 允许承接后续对话里的角色展开，不被冻结为第一句输入
      - 当前生成使用的是“当前生成上下文”，不是对完整原始历史的机械重放
      - 原始对话负责更新 feelingAnchor 与其他当前状态；正式生成默认消费 feelingAnchor 与当前 state bundle，而不是直接重放原始对话历史
