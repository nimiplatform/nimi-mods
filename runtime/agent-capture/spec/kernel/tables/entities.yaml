version: 1
entities:
  - entity: AgentDraft
    source_rule: AC-DOM-001
    description: 对话式角色捕捉的私有工作态草稿。
    fields:
      - name: id
        type: ULID
        required: true
        description: 唯一标识
      - name: status
        type: enum
        required: true
        values: [draft, archived]
        description: 工作态生命周期状态
      - name: sourceImage
        type: ImageRef
        required: false
        description: 图像输入引用；与 sourcePrompt 至少其一存在后，方可进入生成阶段
      - name: sourcePrompt
        type: string
        required: false
        description: 用户原始文字输入；与 sourceImage 至少其一存在后，方可进入生成阶段
      - name: styleHint
        type: string
        required: false
        description: 用户自由补充的风格提示，不是硬枚举风格字段
      - name: generatedImage
        type: ImageRef
        required: false
        description: 当前正式图像结果；一次显式生成只产出一个当前结果
      - name: name
        type: string
        required: false
        description: 角色名称草稿；生成后允许用户编辑
      - name: bio
        type: string
        required: false
        description: 角色简介草稿；生成后允许用户编辑
      - name: personaSeed
        type: string
        required: false
        description: 系统整理后的人设种子文本；第一版不直接开放手改
      - name: tags
        type: string[]
        required: false
        description: 角色检索与风格标签；生成后允许用户编辑
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
    notes:
      - AgentDraft 是 mod 私有 working state，不是 canonical agent
      - 保存 draft 不要求立即 handoff
      - 空 draft 可临时存在，但离开上下文后应自动清理
