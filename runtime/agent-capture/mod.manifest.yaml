id: world.nimi.agent-capture
name: Agent-Capture
version: 1.0.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/agent-capture/index.js
styles:
  - ./dist/mods/agent-capture/index.css
description: >
  帮助用户获得角色形象的工作台。以文字为主输入，可附加参考图与已有
  agent 背景，通过对话式收敛生成角色首图与草稿信息。
capabilities:
  - runtime.ai.text.generate
  - runtime.media.image.generate
  - runtime.route.list.options
  - runtime.route.resolve
  - storage.sqlite.query
  - storage.sqlite.execute
  - storage.files.read
  - storage.files.write
  - data.query.data-api.creator.agents.list
  - data.query.data-api.creator.agents.get
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - inter-mod.request.forge.agent-draft-handoff
ai:
  consume:
    - chat
    - image
  profiles:
    - id: agent-capture-default
      title: Default capture stack
      description: Balanced role-capture stack with local chat guidance and image generation.
      recommended: true
      consumeCapabilities:
        - chat
        - image
      entries:
        - entryId: agent-capture/chat-qwen2.5-7b
          kind: model
          capability: chat
          modelId: qwen2.5-7b-instruct
          repo: Qwen/Qwen2.5-7B-Instruct-GGUF
          engine: openai-compatible
          title: Qwen2.5 7B Instruct (default)
          required: true
          preferred: true
        - entryId: agent-capture/image-z-image-turbo
          kind: model
          capability: image
          modelId: local/z_image_turbo
          repo: jayn7/Z-Image-Turbo-GGUF
          engine: media
          title: Z-Image Turbo (GGUF)
          required: true
          preferred: true
        - entryId: agent-capture/image-z-image-ae
          kind: artifact
          capability: image
          artifactId: local/z_image_ae
          artifactKind: vae
          templateId: verified.artifact.z_image.vae
          engine: media
          title: Z-Image AE VAE
          required: true
          preferred: true
        - entryId: agent-capture/image-qwen3-4b-companion
          kind: artifact
          capability: image
          artifactId: local/qwen3_4b_companion
          artifactKind: llm
          templateId: verified.artifact.z_image.qwen3_4b
          engine: media
          title: Qwen3 4B Companion LLM
          required: true
          preferred: true
