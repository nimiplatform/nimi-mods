id: world.nimi.buddy
name: Buddy
version: 1.0.0
kind: capability-mod
iconAsset: ./assets/icon.svg
entry: ./dist/mods/buddy/index.js
styles:
  - ./dist/mods/buddy/index.css
description: >
  Live2D 儿童互动陪伴 mod。渲染卡通角色，通过文字和语音与用户互动，
  角色具备眨眼、眼球微动、呼吸、口型同步和情绪表情等动画能力。

capabilities:
  - runtime.ai.text.generate
  - runtime.ai.text.stream
  - runtime.media.tts.stream
  - runtime.media.tts.synthesize
  - runtime.media.tts.list.voices
  - runtime.media.stt.transcribe
  - runtime.route.list.options
  - runtime.route.resolve
  - runtime.route.check.health
  - storage.sqlite.query
  - storage.sqlite.execute
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes

ai:
  consume:
    - chat
    - tts
    - stt
