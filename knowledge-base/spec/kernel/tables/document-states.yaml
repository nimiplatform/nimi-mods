version: 1
description: KBDocument processing state machine
source_rule: KB-PIPE-001

states:
  - { id: pending,   label: "Pending",   label_zh: "等待处理", description: "文档已创建，等待处理" }
  - { id: parsing,   label: "Parsing",   label_zh: "解析中",   description: "格式解析中（MIME → 纯文本）" }
  - { id: chunking,  label: "Chunking",  label_zh: "分块中",   description: "文本分块中" }
  - { id: embedding, label: "Embedding", label_zh: "向量化中", description: "向量化中（批量 embedding）" }
  - { id: ready,     label: "Ready",     label_zh: "就绪",     description: "全部 chunk 已向量化，可检索" }
  - { id: error,     label: "Error",     label_zh: "错误",     description: "任一阶段失败，记录 errorReason" }

transitions:
  - { from: pending,   to: parsing,   trigger: "pipeline_start",     description: "开始处理" }
  - { from: parsing,   to: chunking,  trigger: "parse_complete",     description: "解析成功" }
  - { from: chunking,  to: embedding, trigger: "chunk_complete",     description: "分块成功" }
  - { from: embedding, to: ready,     trigger: "embed_complete",     description: "向量化全部完成" }
  - { from: pending,   to: error,     trigger: "pipeline_fail",      description: "启动失败" }
  - { from: parsing,   to: error,     trigger: "parse_fail",         description: "解析失败", side_effects: [set_error_reason] }
  - { from: chunking,  to: error,     trigger: "chunk_fail",         description: "分块失败", side_effects: [set_error_reason] }
  - { from: embedding, to: error,     trigger: "embed_fail",         description: "向量化失败", side_effects: [set_error_reason] }
  - { from: error,     to: pending,   trigger: "user_retry",         description: "用户重试" }

terminal_states: [ready, error]

constraints:
  - "状态只能沿管线单向前进（除 error → pending 重试路径）"
  - "删除文档时无论何种状态，均级联清理 chunk 和 vector 数据"
  - "文档处理为异步操作，UI 必须展示进度状态"
