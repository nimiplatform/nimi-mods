version: 1
cases:
  - id: KB-001-DOCUMENT-IMPORT-PIPELINE
    description: Document import triggers full pipeline (pending -> parsing -> chunking -> embedding -> ready).
    expected_ok: true
    reason_code: null
    source_rule: KB-ACC-002
  - id: KB-002-FORMAT-UNSUPPORTED-FAILCLOSE
    description: Unsupported MIME type fails close with KB_FORMAT_UNSUPPORTED.
    expected_ok: false
    reason_code: KB_FORMAT_UNSUPPORTED
    source_rule: KB-ACC-002
  - id: KB-003-EMBEDDING-ROUTE-UNAVAILABLE
    description: No embedding route available fails close with KB_EMBEDDING_ROUTE_UNAVAILABLE.
    expected_ok: false
    reason_code: KB_EMBEDDING_ROUTE_UNAVAILABLE
    source_rule: KB-ACC-002
  - id: KB-004-RAG-END-TO-END
    description: RAG pipeline produces streamed answer with citation references mapped to source chunks.
    expected_ok: true
    reason_code: null
    source_rule: KB-ACC-002
  - id: KB-005-QUERY-REWRITE-DEGRADATION
    description: Query rewriting failure falls back to original query without blocking RAG pipeline.
    expected_ok: true
    reason_code: KB_QUERY_REWRITE_FAILED
    source_rule: KB-ACC-002
  - id: KB-006-SEARCH-EMPTY-HANDLING
    description: Empty search result informs user explicitly without hallucinating an answer.
    expected_ok: true
    reason_code: KB_SEARCH_EMPTY
    source_rule: KB-ACC-002
  - id: KB-007-DOCUMENT-DELETE-CASCADE
    description: Deleting a document cascades to remove all associated chunks and vectors.
    expected_ok: true
    reason_code: null
    source_rule: KB-ACC-002
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:knowledge-base-kernel-docs
    source_rule: KB-ACC-001
  - command: pnpm -C nimi-mods run check:spec:knowledge-base-kernel-docs-drift
    source_rule: KB-ACC-001
  - command: pnpm -C nimi-mods run check:spec:knowledge-base-kernel-consistency
    source_rule: KB-ACC-001
  - command: pnpm -C nimi-mods run check
    source_rule: KB-ACC-001
