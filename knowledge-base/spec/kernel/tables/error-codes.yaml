version: 1
description: Knowledge Base error/reason code definitions
source_rule: KB-DOM-001, KB-PIPE-001 ~ KB-PIPE-005, KB-RAG-001 ~ KB-RAG-005

error_codes:
  # Document ingestion errors
  - id: KB_FORMAT_UNSUPPORTED
    label: "Format Unsupported"
    label_zh: "不支持的格式"
    phase: parsing
    description: "文件格式不在支持列表中（当前支持：txt, md, csv, json, html）"

  - id: KB_PARSING_FAILED
    label: "Parsing Failed"
    label_zh: "解析失败"
    phase: parsing
    description: "文件内容解析异常"

  - id: KB_CHUNKING_FAILED
    label: "Chunking Failed"
    label_zh: "分块失败"
    phase: chunking
    description: "文本分块过程中异常"

  - id: KB_EMBEDDING_FAILED
    label: "Embedding Failed"
    label_zh: "向量化失败"
    phase: embedding
    description: "向量化失败（provider 错误或批次异常）"

  - id: KB_EMBEDDING_ROUTE_UNAVAILABLE
    label: "Embedding Route Unavailable"
    label_zh: "Embedding 路由不可用"
    phase: embedding
    description: "无可用的 embedding 路由（token-api 和 local-runtime 均不可用）"

  # Search errors
  - id: KB_SEARCH_EMPTY
    label: "Search Empty"
    label_zh: "检索为空"
    phase: search
    description: "检索结果为空或全部低于 similarityThreshold"

  - id: KB_SEARCH_FAILED
    label: "Search Failed"
    label_zh: "检索失败"
    phase: search
    description: "向量检索执行失败"

  # RAG errors
  - id: KB_AI_GENERATE_FAILED
    label: "AI Generate Failed"
    label_zh: "AI 生成失败"
    phase: rag
    description: "LLM 回答生成失败"

  - id: KB_QUERY_REWRITE_FAILED
    label: "Query Rewrite Failed"
    label_zh: "Query 改写失败"
    phase: rag
    description: "多轮 query rewriting 失败（降级使用原始 query）"

  # Storage errors
  - id: KB_STORAGE_QUOTA_EXCEEDED
    label: "Storage Quota Exceeded"
    label_zh: "存储空间不足"
    phase: storage
    description: "IndexedDB 存储容量超限"

  # Resource errors
  - id: KB_DOCUMENT_NOT_FOUND
    label: "Document Not Found"
    label_zh: "文档不存在"
    phase: query
    description: "请求的文档 ID 不存在"

  - id: KB_CONVERSATION_NOT_FOUND
    label: "Conversation Not Found"
    label_zh: "对话不存在"
    phase: query
    description: "请求的对话 ID 不存在"
