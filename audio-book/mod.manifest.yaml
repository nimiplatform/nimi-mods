id: world.nimi.audio-book
name: Audio Book
version: 0.1.0
kind: capability-mod
entry: ./dist/mods/audio-book/index.js
description: >
  多角色 AI 有声书生成工作室。
capabilities:
  - runtime.ai.text.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.synthesize
  - runtime.route.list.options
  - runtime.route.resolve
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - event.publish.ab:synthesis:progress
  - event.subscribe.ab:synthesis:progress
ai:
  consume:
    - chat
    - tts
  dependencies:
    required:
      - dependencyId: audio-book/chat-qwen2.5-7b
        kind: model
        capability: chat
        modelId: qwen2.5-7b-instruct
        repo: Qwen/Qwen2.5-7B-Instruct-GGUF
        engine: openai-compatible
        title: Qwen2.5 7B Instruct (analysis)
    optional:
      - dependencyId: audio-book/tts-token-node
        kind: node
        capability: tts
        nodeId: speech.synthesize.cloud
        title: Token API TTS node
    alternatives:
      - alternativeId: audio-book-tts-qwen3
        preferredDependencyId: audio-book/tts-qwen3-1.7b
        options:
          - dependencyId: audio-book/tts-qwen3-1.7b
            kind: service
            capability: tts
            serviceId: qwen-tts-python
            modelId: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
            repo: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
            engine: qwen-tts-python
            title: Qwen3 TTS 1.7B (recommended)
          - dependencyId: audio-book/tts-qwen3-0.6b
            kind: service
            capability: tts
            serviceId: qwen-tts-python
            modelId: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
            repo: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
            engine: qwen-tts-python
            title: Qwen3 TTS 0.6B
    preferred:
      chat: audio-book/chat-qwen2.5-7b
      tts: audio-book/tts-qwen3-1.7b
