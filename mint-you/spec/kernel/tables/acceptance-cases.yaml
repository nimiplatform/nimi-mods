version: 1
cases:
  - id: MY-001-FULL-INTAKE-SUCCESS
    description: Complete intake flow (basic-info + interests + all scenarios) produces a valid persona card.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
  - id: MY-002-TRAIT-EXTRACTION-PRODUCES-PRIMARY
    description: Trait extraction resolves exactly one dnaPrimary from aggregated scenario scores.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
  - id: MY-003-DNA-SCHEMA-CONFORMANCE
    description: Synthesized DNA object passes AgentDna 5-dimensional schema validation.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
  - id: MY-004-USER-CONFIRM-GATE
    description: Agent creation is blocked until user explicitly confirms persona card.
    expected_ok: false
    reason_code: MINTYOU_CONFIRM_REQUIRED
    prerequisite: user has not confirmed
    source_rule: MY-ACC-002
  - id: MY-005-AGENT-CREATE-SUCCESS
    description: After confirmation, agent is created with INCUBATING state and correct worldId binding.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
  - id: MY-006-WORLD-NOT-SELECTED-FAIL-CLOSE
    description: Agent creation fails with blocking error when no worldId is selected.
    expected_ok: false
    reason_code: MINTYOU_WORLD_NOT_SELECTED
    source_rule: MY-ACC-002
  - id: MY-007-SYNTHESIS-FAILURE-FAIL-CLOSE
    description: DNA synthesis failure returns blocking error with actionable hint.
    expected_ok: false
    reason_code: MINTYOU_DNA_SYNTHESIS_FAILED
    source_rule: MY-ACC-002
  - id: MY-008-TRAIT-OVERRIDE-RESYNTHESIS
    description: User modifying a trait in preview triggers re-synthesis of dependent fields only. Unaffected fields remain stable.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
  - id: MY-009-SCENARIO-INCOMPLETE-BLOCKED
    description: Advancing past scenarios step is blocked when not all scenarios are answered.
    expected_ok: false
    reason_code: MINTYOU_SCENARIO_INCOMPLETE
    source_rule: MY-ACC-002
  - id: MY-010-IDEMPOTENT-CREATE
    description: Re-confirming the same persona card in the same session does not create a duplicate agent.
    expected_ok: true
    reason_code: null
    source_rule: MY-ACC-002
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:mint-you-kernel-docs
    source_rule: MY-ACC-003
  - command: pnpm -C nimi-mods run check:spec:mint-you-kernel-docs-drift
    source_rule: MY-ACC-003
  - command: pnpm -C nimi-mods run check:spec:mint-you-kernel-consistency
    source_rule: MY-ACC-003
  - command: pnpm -C nimi-mods run check
    source_rule: MY-ACC-003
