version: 1
codes:
  # ─── Creation flow ───
  - code: MINTYOU_INPUT_INVALID
    stage: basic-info
    blocking: true
    action_hint: Complete all required basic info fields and retry.
    source_rule: MY-ERR-001
  - code: MINTYOU_INTERVIEW_INCOMPLETE
    stage: interview
    blocking: true
    action_hint: Continue the interview conversation until enough valid turns are completed.
    source_rule: MY-ERR-001
  - code: MINTYOU_INTERVIEW_DEGRADED
    stage: trait-extract
    blocking: false
    action_hint: Interview ended with fewer valid turns than ideal. Some traits use default values.
    source_rule: MY-ERR-003
  - code: MINTYOU_INTERVIEW_TURN_FAILED
    stage: interview
    blocking: false
    action_hint: A single interview turn failed. Retry the message.
    source_rule: MY-ERR-003
  - code: MINTYOU_TRAIT_EXTRACTION_FAILED
    stage: trait-extract
    blocking: true
    action_hint: Verify scenario data integrity and retry extraction.
    source_rule: MY-ERR-001
  - code: MINTYOU_DNA_SYNTHESIS_FAILED
    stage: dna-synthesize
    blocking: true
    action_hint: Check LLM route availability and retry synthesis.
    source_rule: MY-ERR-001
  - code: MINTYOU_CONFIRM_REQUIRED
    stage: user-confirm
    blocking: true
    action_hint: Review persona card and explicitly confirm before creating agent.
    source_rule: MY-ERR-001
  - code: MINTYOU_WORLD_NOT_SELECTED
    stage: agent-create
    blocking: true
    action_hint: OASIS world is unavailable. Retry after world data capability is ready.
    source_rule: MY-ERR-001
  - code: MINTYOU_AGENT_CREATE_FAILED
    stage: agent-create
    blocking: true
    action_hint: Check agent creation payload and backend availability.
    source_rule: MY-ERR-001
  - code: MINTYOU_HANDLE_UNAVAILABLE
    stage: agent-create
    blocking: true
    action_hint: Choose a different handle for the agent. Auto-retry up to 3 times.
    source_rule: MY-ERR-001
  - code: MINTYOU_AGENT_LIMIT_REACHED
    stage: agent-create
    blocking: true
    action_hint: You have reached the maximum number of agents (5). Remove an existing agent before creating a new one.
    source_rule: MY-ERR-001
  - code: MINTYOU_SESSION_EXPIRED_WARN
    stage: resume
    blocking: false
    action_hint: Session data expired after 7 days of inactivity. Restart intake flow.
    source_rule: MY-ERR-003

  # ─── Photo trust ───
  - code: MINTYOU_PHOTO_NO_PHOTO
    stage: photo-reveal
    blocking: false
    action_hint: The other user has not uploaded a photo yet.
    source_rule: MY-ERR-003
  - code: MINTYOU_PHOTO_REQUEST_DECLINED
    stage: photo-reveal
    blocking: false
    action_hint: The other user declined your photo reveal request. You may request again after the cooldown period.
    source_rule: MY-ERR-003
  - code: MINTYOU_PHOTO_COOLDOWN_ACTIVE
    stage: photo-reveal
    blocking: true
    action_hint: A previous request was declined. Wait for the cooldown period (24h) before requesting again.
    source_rule: MY-ERR-001
