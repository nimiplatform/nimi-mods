version: 1
codes:
  - code: NARRATIVE_INPUT_INVALID
    stage: input
    blocking: true
    action_hint: Fix turn input fields and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_CONTEXT_INSUFFICIENT
    stage: step1-assembly
    blocking: true
    action_hint: Complete required context scopes and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_GENERATION_SCHEMA_INVALID
    stage: step2-generate
    blocking: true
    action_hint: Repair CoreOutput schema contract and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_VISIBILITY_INVALID
    stage: step3-guard
    blocking: true
    action_hint: Enforce visibility enum and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_EVENT_COUNT_UNDERFLOW
    stage: step3-guard
    blocking: true
    action_hint: Raise minimum event output and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_EVENT_COUNT_OVERFLOW_ADJUSTED
    stage: step3-guard
    blocking: false
    action_hint: Output is truncated and adjusted before commit.
    source_rule: N-ERR-003
  - code: NARRATIVE_TENSION_JUMP_ADJUSTED
    stage: step3-guard
    blocking: false
    action_hint: Tension delta is too large and has been adjusted.
    source_rule: N-ERR-003
  - code: NARRATIVE_SPINE_WRITE_CONFLICT
    stage: write-spine
    blocking: true
    action_hint: Resolve append conflict and retry.
    source_rule: N-ERR-001
  - code: NARRATIVE_INITIATIVE_COOLDOWN_ACTIVE
    stage: initiative
    blocking: false
    action_hint: Wait for cooldown window before next initiative tick.
    source_rule: N-INIT-003
  - code: NARRATIVE_RUN_CANCELED
    stage: run
    blocking: false
    action_hint: Run is canceled. Resume from checkpoint or start a new run.
    source_rule: N-RUN-008
