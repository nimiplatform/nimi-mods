version: 1
mod_identity:
  mod_id: world.nimi.narrative-engine
  name: Narrative Engine
  entry: ./dist/mods/narrative-engine/index.js
  source_rule: N-CAP-001
required_capabilities:
  - key: llm.text.generate
    source_rule: N-CAP-002
  - key: data.query.data-api.runtime.route.options
    source_rule: N-CAP-003
  - key: data.query.data-api.world.access.me
    source_rule: N-CAP-003
  - key: data.query.data-api.world.events.list
    source_rule: N-CAP-003
  - key: data.query.data-api.world.lorebooks.list
    source_rule: N-CAP-003
  - key: data.query.data-api.core.agent.memory.recall.for-entity
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.context.resolve
    source_rule: N-CAP-003
  - key: data.query.data-api.narrative.context.resolve
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.turn.window
    source_rule: N-CAP-003
  - key: data.query.data-api.narrative.turn.window
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.turn.latest
    source_rule: N-CAP-003
  - key: data.query.data-api.narrative.turn.latest
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.turn.by-id
    source_rule: N-CAP-003
  - key: data.query.data-api.narrative.turn.by-id
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.projection.render-input
    source_rule: N-CAP-003
  - key: data.query.data-api.narrative.projection.render-input
    source_rule: N-CAP-003
  - key: data.register.data-api.narrative.turn-result.upsert
    source_rule: N-CAP-004
  - key: data.query.data-api.narrative.turn-result.upsert
    source_rule: N-CAP-004
  - key: data.register.data-api.narrative.spine.append
    source_rule: N-CAP-004
  - key: data.query.data-api.narrative.spine.append
    source_rule: N-CAP-004
  - key: data.register.data-api.narrative.audit.append
    source_rule: N-CAP-004
  - key: data.query.data-api.narrative.audit.append
    source_rule: N-CAP-004
minimal_permission_policy:
  wildcard_forbidden: true
  capability_addition_requires_spec_update: true
  source_rule: N-CAP-002
forbidden_patterns:
  - pattern: sdk-runtime-direct-import
    reason: bypasses mod runtime capability boundary
    source_rule: N-CAP-002
  - pattern: raw-realm-payload-direct-write
    reason: breaks narrative projection and write boundary
    source_rule: N-CAP-004
