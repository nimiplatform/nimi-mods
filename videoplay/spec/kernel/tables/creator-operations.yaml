version: 1
minimum_closed_loop_operations:
  - operation: insert-shot
    required: true
    source_rule: V-OPS-002
  - operation: update-shot
    required: true
    source_rule: V-OPS-002
  - operation: delete-shot
    required: true
    source_rule: V-OPS-002
  - operation: regenerate-shot
    required: true
    source_rule: V-OPS-002
  - operation: create-shot-variant
    required: true
    source_rule: V-OPS-002
  - operation: undo-last-regeneration
    required: true
    source_rule: V-OPS-002
  - operation: link-shot-transition
    required: true
    source_rule: V-OPS-002
  - operation: generate-first-last-frame
    required: true
    source_rule: V-OPS-002
  - operation: generate-voice-line
    required: true
    source_rule: V-OPS-002
    completion_contract:
      requires_runtime_tts: true
      required_assets:
        - voice-audio
      synthetic_only_placeholder_allowed: false
      source_rule: V-OPS-006
  - operation: apply-lip-sync
    required: true
    source_rule: V-OPS-002
  - operation: create-branch
    required: true
    source_rule: V-OPS-002
  - operation: switch-branch
    required: true
    source_rule: V-OPS-002
extended_operations:
  - operation: split-shot
    required: false
    source_rule: V-OPS-001
  - operation: merge-shots
    required: false
    source_rule: V-OPS-001
  - operation: reorder-shot
    required: false
    source_rule: V-OPS-001
  - operation: redo
    required: false
    source_rule: V-OPS-001
  - operation: merge-branch
    required: false
    source_rule: V-OPS-001
  - operation: select-candidate
    required: true
    source_rule: V-OPS-002
  - operation: regenerate-candidate
    required: true
    source_rule: V-OPS-002
  - operation: update-character-appearance
    required: true
    source_rule: V-OPS-002
  - operation: select-bgm-track
    required: true
    source_rule: V-OPS-002
  - operation: update-sfx-layer
    required: true
    source_rule: V-OPS-002
operation_audit_required_fields:
  fields:
    - versionId
    - parentVersionId
    - branchId
    - operationType
    - deltaSummary
    - operator
    - timestamp
  source_rule: V-OPS-005
stage_scoped_editability:
  - stage: script
    editable_payloads:
      - episode-boundary
      - segmentation-policy
      - beat-structure
    source_rule: V-OPS-007
  - stage: storyboard
    editable_payloads:
      - shot-plan
      - transition
      - camera-motion
    source_rule: V-OPS-007
  - stage: voice
    editable_payloads:
      - voice-profile
      - line-text
      - lip-sync-anchor
    source_rule: V-OPS-007
  - stage: casting
    editable_payloads:
      - character-appearance
      - role-level
    source_rule: V-OPS-007
  - stage: selection
    editable_payloads:
      - selected-segment-ids
      - timeline-order-and-trim
    source_rule: V-OPS-007
  - stage: audio
    editable_payloads:
      - bgm-track-selection
      - sfx-layer-adjustment
    source_rule: V-OPS-007
  - stage: video
    editable_payloads:
      - timeline-adjustment
    source_rule: V-OPS-007
stage_advance:
  explicit_advance_required: true
  auto_advance_forbidden: true
  source_rule: V-OPS-008
