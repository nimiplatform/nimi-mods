version: 1
input_required_fields:
  fields:
    - episodeId
    - clipAssets
    - shotAssets
    - sourceEventMap
  source_rule: V-EDIT-001
clip_asset_required_fields:
  fields:
    - clipId
    - uri
    - durationMs
    - fps
    - resolution
  source_rule: V-EDIT-001
output_required_fields:
  fields:
    - episodeTimeline
    - episodeMasterVideo
    - episodePoster
    - episodeCaptionTrack
    - composeTrace
  source_rule: V-EDIT-001
episode_master_duration_ms:
  min: 15000
  max: 180000
  source_rule: V-EDIT-001
timeline:
  fps_default: 30
  video_track_must_be_sorted_by_start_ms: true
  video_track_overlap_forbidden: true
  master_duration_equals_last_clip_end: true
  source_rule: V-EDIT-002
av_thresholds:
  max_av_drift_ms: 80
  max_black_gap_ms: 250
  source_rule: V-EDIT-003
export_spec:
  video_codec: H.264
  audio_codec: AAC
  container: mp4
  source_rule: V-EDIT-004
idempotency:
  compose_replay_same_key_must_not_change_uri: true
  same_asset_set_must_produce_same_timeline_hash: true
  source_rule: V-EDIT-005
