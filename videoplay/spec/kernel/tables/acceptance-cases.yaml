version: 1
cases:
  - id: VID-001-CONTINUOUS-TURNS-TO-EPISODE
    description: Continuous narrative turns segment into at least one episode.
    expected_ok: true
    status_flow:
      - INGEST
      - SEGMENT
      - SCREENPLAY
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-002-EPISODE-RELEASE-PACKAGE
    description: Approved episode includes complete release package minimum set.
    expected_ok: true
    release_package_fields:
      - episodeMasterVideo
      - episodePoster
      - episodeCaptionTrack
      - episodeMetadata
      - episodeTraceBundle
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-003-SEGMENTED-RENDER-NOT-ONE-SHOT
    description: Render mode is segmented and does not call one long video generation.
    expected_ok: true
    single_long_video_call: false
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-004-SOURCE-EVENT-GROUNDING-FAIL
    description: Missing source event grounding fails close.
    expected_ok: false
    reason_code: VIDEOPLAY_QC_FAILED
    source_rule: V-ACC-002
  - id: VID-005-CLIP-COVERAGE-LOW-REJECT
    description: Low clip coverage rejects release package.
    expected_ok: false
    reason_code: VIDEOPLAY_CLIP_RENDER_COVERAGE_LOW
    source_rule: V-ACC-002
  - id: VID-006-IDEMPOTENT-REPLAY
    description: Same idempotency key replay does not duplicate writes.
    expected_ok: true
    replay_detected: true
    asset_write_count: 1
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-007-ROUTE-FALLBACK-AUDITED
    description: Route fallback to cloud is visible and auditable.
    expected_ok: true
    fallback_visible: true
    audit_contains: fallback_to_cloud
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-008-PERSIST-WARN-NONBLOCKING
    description: Persistence warning does not block completed output.
    expected_ok: true
    reason_code: VIDEOPLAY_PERSISTENCE_FAILED_WARN
    source_rule: V-ACC-002
  - id: VID-009-SEGMENTATION-DETERMINISTIC
    description: Same input and policy produce same segmentation output.
    expected_ok: true
    deterministic: true
    mismatch_reason_code: VIDEOPLAY_EPISODE_SEGMENTATION_NON_DETERMINISTIC
    source_rule: V-ACC-002
  - id: VID-010-TIMELINE-OVERLAP-REJECT
    description: Timeline overlap is rejected.
    expected_ok: false
    reason_code: VIDEOPLAY_TIMELINE_SCHEMA_INVALID
    source_rule: V-ACC-002
  - id: VID-011-AV-SYNC-DRIFT-REJECT
    description: AV drift beyond threshold is rejected.
    expected_ok: false
    reason_code: VIDEOPLAY_AUDIO_VIDEO_SYNC_DRIFT
    source_rule: V-ACC-002
  - id: VID-012-VISUAL-ATTRACTION-LOW-REJECT
    description: Visual attraction score below threshold is rejected.
    expected_ok: false
    reason_code: VIDEOPLAY_VISUAL_ATTRACTION_LOW
    source_rule: V-ACC-002
  - id: VID-013-STORY-CATALOG-PRIMARY-ONLY
    description: Playable VideoPlay story catalog keeps PRIMARY world events only.
    expected_ok: true
    primary_only: true
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-014-VIDEOSTORY-PACKAGE-READY
    description: VideoStoryPackage assembles required fields from world/context/memory and narrative projection inputs.
    expected_ok: true
    package_ready: true
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-015-ENRICHED-SOURCE-REQUIRES-USER-OR-INITIATIVE-TURN
    description: Enriched mode fails close when no UserTurn or AgentInitiative turn exists in selected window.
    expected_ok: false
    reason_code: VIDEOPLAY_STORY_SOURCE_UNAVAILABLE
    source_rule: V-ACC-002
  - id: VID-016-RUN-BLOCKED-WHEN-STORY-PACKAGE-NOT-READY
    description: Pipeline run is blocked when story package is missing critical context or schema invalid.
    expected_ok: false
    reason_code: VIDEOPLAY_STORY_PACKAGE_INVALID
    source_rule: V-ACC-002
  - id: VID-017-STEPWISE-RUN-PAUSES-AT-CHECKPOINT
    description: Run pipeline in stepwise mode executes one stage and pauses with checkpoint metadata.
    expected_ok: true
    paused: true
    checkpoint_required_fields:
      - checkpointToken
      - stepInputHash
      - lastCompletedUnit
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-018-CONTINUE-FROM-CHECKPOINT-ADVANCES-NEXT-STAGE
    description: Continue from checkpoint advances exactly the next pending stage without replaying completed stages.
    expected_ok: true
    stage_replay: none
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-019-RERUN-STEP-INVALIDATES-DOWNSTREAM
    description: Rerun step clears downstream outputs and recomputes from selected stage with incremented attempt.
    expected_ok: true
    downstream_invalidated: true
    attempt_monotonic: true
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-020-RESUME-HASH-MISMATCH-FAIL-CLOSE
    description: Resume rejects checkpoint when stepInputHash mismatches current stage input.
    expected_ok: false
    reason_code: VIDEOPLAY_STEP_RESUME_HASH_MISMATCH
    source_rule: V-ACC-002
  - id: VID-021-CANCEL-RUN-TERMINAL
    description: Cancel run transitions to terminal CANCELED and emits run.canceled instead of run.error.
    expected_ok: true
    terminal_state: CANCELED
    reason_code: VIDEOPLAY_RUN_CANCELED
    source_rule: V-ACC-002
  - id: VID-022-ASSET-ANALYSIS-QUEUE-TRACE
    description: Asset render emits deterministic analysis plan and batch/queue execution trace.
    expected_ok: true
    analysis_trace_required: true
    queue_trace_required: true
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-023-VOICE-ROUTE-FALLBACK-AUDITED
    description: Voice rendering route fallback from local to cloud is auditable with required fields.
    expected_ok: true
    stage: asset-render-voice
    fallback_visible: true
    reason_code: null
    source_rule: V-ACC-002
  - id: VID-024-VOICE-COVERAGE-REJECT
    description: Planned voice modality with insufficient rendered voice coverage fails close before release.
    expected_ok: false
    reason_code: VIDEOPLAY_VOICE_RENDER_FAILED
    source_rule: V-ACC-002
  - id: VID-025-VOICE-FIRST-SUBFLOW-ORDER
    description: Asset render executes voice-analyze/voice-render/lip-sync before video-render for voice-required shots.
    expected_ok: true
    required_phase_order:
      - voice-analyze
      - voice-render
      - lip-sync
      - video-render
    source_rule: V-ACC-002
  - id: VID-026-CREATOR-GENERATE-VOICE-LINE-REAL-TTS
    description: Creator generate-voice-line operation produces real voice-audio asset via runtime TTS rather than script-only placeholder.
    expected_ok: true
    required_assets:
      - voice-audio
    disallowed_asset_only_mode:
      - voice-script-only
    source_rule: V-ACC-002
  - id: VID-027-WORKBENCH-STAGE-PRECONDITION-BLOCK
    description: Stage advance is blocked with blocking reason code when required upstream payload is missing.
    expected_ok: false
    reason_code: VIDEOPLAY_STAGE_PRECONDITION_BLOCKED
    source_rule: V-ACC-002
  - id: VID-028-WORKBENCH-STAGE-READINESS-DERIVATION
    description: Workbench stage statuses are deterministically derived as empty/processing/ready/blocked from checkpoint and outputs.
    expected_ok: true
    readiness_status_enum:
      - empty
      - processing
      - ready
      - blocked
    source_rule: V-ACC-002
  - id: VID-029-WORKBENCH-ADVANCE-EXPLICIT
    description: Stage edits require explicit advance and cannot auto-run downstream stages.
    expected_ok: true
    auto_advance_forbidden: true
    source_rule: V-ACC-002
  - id: VID-030-RERUN-IMPACT-PREVIEW-REQUIRED
    description: Rerun after stage edit must surface rebuild impact scope before execution.
    expected_ok: true
    required_scope_values:
      - shot
      - adjacent-shots-plus-compose
      - clip-plus-compose
      - post-segmentation-full-chain
    source_rule: V-ACC-002
  - id: VID-031-CHARACTER-CASTING-OUTPUT
    description: Character casting produces CharacterCastingOutput with appearance candidates from agent memory.
    expected_ok: true
    required_output: character_casting_output
    source_rule: V-ACC-002
  - id: VID-032-SCENE-PLANNING-OUTPUT
    description: Scene planning produces ScenePlanningOutput with environment descriptions and reference images.
    expected_ok: true
    required_output: scene_planning_output
    source_rule: V-ACC-002
  - id: VID-033-CANDIDATE-SELECTION-AUTO
    description: Candidate selection auto-selects rendered video segment IDs and emits timeline order.
    expected_ok: true
    auto_select: true
    source_rule: V-ACC-002
  - id: VID-034-AUDIO-DESIGN-BGM-TRACK
    description: Audio design produces BGM track and SFX layers from storyboard beat analysis.
    expected_ok: true
    required_output: audio_design_output
    source_rule: V-ACC-002
  - id: VID-035-STORYBOARD-3PHASE-CINEMATOGRAPHY
    description: Storyboard 3-phase produces PhotographyRule per shot via cinematography LLM call.
    expected_ok: true
    phase: cinematography
    source_rule: V-ACC-002
  - id: VID-036-STORYBOARD-3PHASE-ACTING
    description: Storyboard 3-phase produces ActingDirection per shot via acting LLM call.
    expected_ok: true
    phase: acting
    source_rule: V-ACC-002
  - id: VID-037-ASSET-RENDER-MULTI-CANDIDATE
    description: Asset render outputs one primary video segment per shot for candidate-selection stage.
    expected_ok: true
    video_segment_per_shot: true
    source_rule: V-ACC-002
  - id: VID-038-EDIT-COMPOSE-BGM-INJECT
    description: Edit compose injects audioDesign BGM and SFX into compose output.
    expected_ok: true
    bgm_injected: true
    source_rule: V-ACC-002
  - id: VID-039-QC-CHARACTER-CONSISTENCY
    description: QC gate evaluates selection coverage ratio against threshold.
    expected_ok: true
    gate: selection_coverage
    min: 0.70
    source_rule: V-ACC-002
  - id: VID-040-QC-PHOTOGRAPHY-COMPLIANCE
    description: QC gate evaluates selection rationality score against threshold.
    expected_ok: true
    gate: selection_rationality
    min: 0.80
    source_rule: V-ACC-002
  - id: VID-041-QC-ACTING-QUALITY
    description: QC gate evaluates acting quality score against threshold.
    expected_ok: true
    gate: acting_quality
    min: 0.60
    source_rule: V-ACC-002
  - id: VID-042-QC-AUDIO-COMPLETENESS
    description: QC gate evaluates audio completeness ratio against threshold.
    expected_ok: true
    gate: audio_completeness
    min: 0.85
    source_rule: V-ACC-002
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:videoplay-kernel-docs
    source_rule: V-ACC-003
  - command: pnpm -C nimi-mods run check:spec:videoplay-kernel-docs-drift
    source_rule: V-ACC-003
  - command: pnpm -C nimi-mods run check:spec:videoplay-kernel-consistency
    source_rule: V-ACC-003
  - command: pnpm -C nimi-mods run check
    source_rule: V-ACC-003
