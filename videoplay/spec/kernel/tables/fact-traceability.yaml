version: 1
fact_layers:
  - layer: base
    owner: realm
    source: world+agent
    source_rule: V-FACT-001
  - layer: narrative
    owner: narrative
    source: CoreOutput
    source_rule: V-FACT-001
  - layer: renderer
    owner: videoplay
    source: narrative_projection
    source_rule: V-FACT-001
write_boundary:
  renderer_write_to_narrative_spine: forbidden
  source_rule: V-FACT-002
required_projection:
  - field: events
    source_rule: V-FACT-003
  - field: triggerSource
    source_rule: V-FACT-003
  - field: userMessage
    source_rule: V-FACT-003
  - field: systemContext
    source_rule: V-FACT-003
  - field: worldStyle
    source_rule: V-FACT-003
  - field: agentAnchor
    source_rule: V-FACT-003
  - field: playerAnchor
    source_rule: V-FACT-003
  - field: sceneAnchor
    source_rule: V-FACT-003
  - field: metrics
    source_rule: V-FACT-003
  - field: sourceEventIds
    source_rule: V-FACT-003
traceability:
  units:
    - episode
    - clip
    - beat
    - shot
  rules:
    - rule: every_unit_must_carry_source_event_ids
      source_rule: V-FACT-004
    - rule: source_event_ids_must_be_subset_of_input_spine_events
      source_rule: V-FACT-004
    - rule: trace_bundle_must_cover_all_rendered_units
      source_rule: V-FACT-004
cross_renderer_consistency:
  same_canonical_core_output: true
  allow_style_divergence: true
  allow_fact_divergence: false
  source_rule: V-FACT-005
