version: 1
mod_identity:
  mod_id: world.nimi.videoplay
  name: VideoPlay
  entry: ./dist/mods/videoplay/index.js
  source_rule: V-CAP-001
required_capabilities:
  - key: llm.text.generate
    source_rule: V-CAP-002
  - key: llm.image.generate
    source_rule: V-CAP-002
  - key: llm.video.generate
    source_rule: V-CAP-002
  - key: data.query.data-api.runtime.route.options
    source_rule: V-CAP-003
  - key: data.query.data-api.world.events.list
    source_rule: V-CAP-006
  - key: data.query.data-api.world.lorebooks.list
    source_rule: V-CAP-006
  - key: data.query.data-api.world.scenes.list
    source_rule: V-CAP-006
  - key: data.query.data-api.world.narrative-contexts.list
    source_rule: V-CAP-006
  - key: data.query.data-api.core.agent.memory.recall.for-entity
    source_rule: V-CAP-006
  - key: data.register.data-api.videoplay.episode.upsert
    source_rule: V-CAP-004
  - key: data.query.data-api.videoplay.episode.upsert
    source_rule: V-CAP-004
  - key: data.register.data-api.videoplay.asset.batch-upsert
    source_rule: V-CAP-004
  - key: data.query.data-api.videoplay.asset.batch-upsert
    source_rule: V-CAP-004
  - key: data.register.data-api.videoplay.release.publish
    source_rule: V-CAP-004
  - key: data.query.data-api.videoplay.release.publish
    source_rule: V-CAP-004
  - key: ui.register.ui-extension.app.sidebar.mods
    source_rule: V-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    source_rule: V-CAP-001
minimal_permission_policy:
  wildcard_forbidden: true
  capability_addition_requires_spec_update: true
  source_rule: V-CAP-002
forbidden_patterns:
  - pattern: direct-vendor-video-api-call
    reason: bypasses runtime route contract
    source_rule: V-CAP-003
  - pattern: cross-mod-narrative-data-api-query
    reason: VideoPlay must use shared narrative-engine module instead of cross-mod data-api query
    source_rule: V-CAP-004
  - pattern: narrative-spine-write
    reason: breaks videoplay renderer write boundary
    source_rule: V-CAP-004
