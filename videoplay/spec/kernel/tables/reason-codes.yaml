version: 1
codes:
  - code: VIDEOPLAY_INPUT_INVALID
    stage: orchestrator
    blocking: true
    action_hint: Fix input schema and value bounds, then retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_FACT_PROJECTION_INVALID
    stage: narrative-bridge
    blocking: true
    action_hint: Repair narrative projection mapping and retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_STORY_PACKAGE_INVALID
    stage: narrative-ingest
    blocking: true
    action_hint: Repair story package schema/coverage and retry.
    source_rule: V-ERR-004
  - code: VIDEOPLAY_STORY_SOURCE_UNAVAILABLE
    stage: narrative-ingest
    blocking: true
    action_hint: Select an available story source mode and retry.
    source_rule: V-ERR-004
  - code: VIDEOPLAY_STAGE_PRECONDITION_BLOCKED
    stage: workbench
    blocking: true
    action_hint: Complete required upstream stage outputs before advance.
    source_rule: V-ERR-007
  - code: VIDEOPLAY_STAGE_ADVANCE_REQUIRED
    stage: workbench
    blocking: true
    action_hint: Confirm stage outputs and click advance before downstream execution.
    source_rule: V-ERR-007
  - code: VIDEOPLAY_EPISODE_SEGMENTATION_FAILED
    stage: segment
    blocking: true
    action_hint: Adjust segmentation policy or input window and retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_EPISODE_SEGMENTATION_NON_DETERMINISTIC
    stage: segment
    blocking: true
    action_hint: Remove non-deterministic segmentation branch.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_SCREENPLAY_SCHEMA_INVALID
    stage: screenplay
    blocking: true
    action_hint: Repair screenplay schema contract.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_STORYBOARD_SCHEMA_INVALID
    stage: storyboard
    blocking: true
    action_hint: Repair storyboard schema contract.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_ROUTE_UNAVAILABLE
    stage: route
    blocking: true
    action_hint: Restore available route source and retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_SHOT_RENDER_FAILED
    stage: render
    blocking: false
    action_hint: Retry failed shot or switch route.
    source_rule: V-ERR-003
  - code: VIDEOPLAY_ASSET_ANALYSIS_INVALID
    stage: render
    blocking: true
    action_hint: Repair asset analysis inputs (storyboard/screenplay) and rerun render.
    source_rule: V-ERR-006
  - code: VIDEOPLAY_BATCH_QUEUE_ORCHESTRATION_FAILED
    stage: render
    blocking: true
    action_hint: Repair render batch/queue plan and rerun render stage.
    source_rule: V-ERR-006
  - code: VIDEOPLAY_VOICE_RENDER_FAILED
    stage: render
    blocking: true
    action_hint: Ensure TTS route/voice selection is available and rerun render.
    source_rule: V-ERR-006
  - code: VIDEOPLAY_CLIP_RENDER_COVERAGE_LOW
    stage: render
    blocking: true
    action_hint: Fill missing shot coverage before QC.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_TIMELINE_SCHEMA_INVALID
    stage: edit
    blocking: true
    action_hint: Repair timeline constraints and retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_AUDIO_VIDEO_SYNC_DRIFT
    stage: edit
    blocking: true
    action_hint: Re-align AV anchors within drift threshold.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_EDIT_COMPOSE_FAILED
    stage: edit
    blocking: true
    action_hint: Repair asset inputs and compose parameters.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_VISUAL_ATTRACTION_LOW
    stage: qc
    blocking: true
    action_hint: Rework storyboard and key shot generation.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_QC_FAILED
    stage: qc
    blocking: true
    action_hint: Resolve failed quality gates and rerun pipeline.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_RELEASE_PACKAGE_INVALID
    stage: package
    blocking: true
    action_hint: Complete release package minimum set and retry.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_PERSISTENCE_FAILED_WARN
    stage: persistence
    blocking: false
    action_hint: Investigate persistence path. Completed output remains valid.
    source_rule: V-ERR-003
  - code: VIDEOPLAY_RUN_CANCELED
    stage: orchestrator
    blocking: true
    action_hint: Start a new run or continue from a non-canceled checkpoint.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_PROMPT_CANARY_FAILED
    stage: prompt
    blocking: true
    action_hint: Repair prompt registry/template drift and rerun.
    source_rule: V-ERR-001
  - code: VIDEOPLAY_CHECKPOINT_INVALID
    stage: checkpoint
    blocking: true
    action_hint: Refresh checkpoint snapshot and rerun from an explicit stage.
    source_rule: V-ERR-005
  - code: VIDEOPLAY_STEP_RESUME_HASH_MISMATCH
    stage: checkpoint
    blocking: true
    action_hint: Rerun the selected step to rebuild downstream outputs.
    source_rule: V-ERR-005
