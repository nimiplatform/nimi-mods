version: 1
route_sources:
  preferred: local-runtime
  fallback: token-api
  source_rule: V-ROUTE-001
stages:
  - stage: screenplay
    capability: llm.text.generate
    fallback_on_unavailable: token-api
    fail_code_when_both_unavailable: VIDEOPLAY_ROUTE_UNAVAILABLE
    source_rule: V-ROUTE-002
  - stage: storyboard
    capability: llm.text.generate
    fallback_on_unavailable: token-api
    fail_code_when_both_unavailable: VIDEOPLAY_ROUTE_UNAVAILABLE
    source_rule: V-ROUTE-002
  - stage: asset-render-image
    capability: llm.image.generate
    fallback_on_unavailable: token-api
    fail_code_when_both_unavailable: VIDEOPLAY_ROUTE_UNAVAILABLE
    source_rule: V-ROUTE-002
  - stage: asset-render-video
    capability: llm.video.generate
    fallback_on_unavailable: token-api
    fail_code_when_both_unavailable: VIDEOPLAY_ROUTE_UNAVAILABLE
    source_rule: V-ROUTE-002
  - stage: asset-render-voice
    capability: llm.speech.synthesize
    fallback_on_unavailable: token-api
    fail_code_when_both_unavailable: VIDEOPLAY_ROUTE_UNAVAILABLE
    source_rule: V-ROUTE-002
audit:
  fallback_event_required: true
  required_fields:
    - traceId
    - stage
    - capability
    - from
    - to
    - reason
  source_rule: V-ROUTE-004
constraints:
  - name: direct_vendor_api_call_in_mod_forbidden
    value: true
    source_rule: V-ROUTE-005
  - name: concrete_vendor_model_binding_in_spec_forbidden
    value: true
    source_rule: V-ROUTE-005
