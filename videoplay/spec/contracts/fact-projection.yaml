version: 2026-03-01-v1
fact_layers:
  base:
    owner: realm
    source: world+agent
  narrative:
    owner: narrative
    source: CoreOutput
  renderer:
    owner: videoplay
    write_access: forbidden
required_projection:
  - events
  - triggerSource
  - userMessage
  - systemContext
  - worldStyle
  - agentAnchor
  - playerAnchor
  - sceneAnchor
  - metrics
  - sourceEventIds
traceability:
  units:
    - episode
    - clip
    - beat
    - shot
  rules:
    - every_unit_must_carry_source_event_ids
    - source_event_ids_must_be_subset_of_input_spine_events
    - trace_bundle_must_cover_all_rendered_units
consistency:
  textplay_and_videoplay:
    same_canonical_core_output: true
    allow_style_divergence: true
    allow_fact_divergence: false
