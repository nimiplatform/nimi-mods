id: world.nimi.relife
name: Re:Life
version: 1.0.0
kind: capability-mod
icon: re-life
entry: ./dist/mods/re-life/index.js
description: >
  Decision retrospect and parallel timeline simulation workspace.
  Enables structured life decision review, parallel path simulation,
  Perfect Run multi-objective analysis, and anonymized social sharing.
capabilities:
  - llm.text.generate
  - llm.text.stream
  - llm.object.generate
  - data.register.data-api.relife.decisions.upsert
  - data.query.data-api.relife.decisions.upsert
  - data.register.data-api.relife.decisions.list
  - data.query.data-api.relife.decisions.list
  - data.register.data-api.relife.decisions.get
  - data.query.data-api.relife.decisions.get
  - data.register.data-api.relife.scenarios.upsert
  - data.query.data-api.relife.scenarios.upsert
  - data.register.data-api.relife.scenarios.list
  - data.query.data-api.relife.scenarios.list
  - data.register.data-api.relife.shared.publish
  - data.query.data-api.relife.shared.publish
  - data.register.data-api.relife.shared.revoke
  - data.query.data-api.relife.shared.revoke
  - data.register.data-api.relife.shared.list
  - data.query.data-api.relife.shared.list
  - data.register.data-api.relife.metrics.aggregate
  - data.query.data-api.relife.metrics.aggregate
  - data.query.data-api.runtime.route.options
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
  dependencies:
    required:
      - dependencyId: relife/chat-default
        kind: model
        capability: chat
        engine: openai-compatible
        title: Default Chat Model (runtime-resolved)
    preferred:
      chat: relife/chat-default
