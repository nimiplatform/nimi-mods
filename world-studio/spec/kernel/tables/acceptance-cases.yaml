version: 1
cases:
  - id: WS-001-ROUTE-READINESS-BLOCK
    description: Phase1 must not start when coarse/fine effective route is unready.
    expected_ok: false
    reason_code: WORLD_STUDIO_ROUTE_CONFIG_REQUIRED
    source_rule: WS-ACC-002
  - id: WS-002-PHASE1-PAUSE-RESUME-CHECKPOINT
    description: Resumable phase1 task pauses with checkpoint and resumes from saved accumulated state.
    expected_ok: true
    resumable: true
    checkpoint_required: true
    source_rule: WS-ACC-002
  - id: WS-003-FAILED-CHUNK-INDEX-MAP
    description: Failed-subset retry preserves logical chunk indices via chunkIndexMap.
    expected_ok: true
    test_reference: world-studio-failed-chunk-retry.test.mjs
    source_rule: WS-ACC-002
  - id: WS-004-COARSE-STRICT-JSON-REPAIR
    description: Coarse extractor retries with strict JSON repair and fails after terminal parse errors.
    expected_ok: true
    test_reference: world-studio-coarse-extractor-retry.test.mjs
    source_rule: WS-ACC-002
  - id: WS-005-PHASE2-STRUCTURED-CONTEXT-WITHOUT-FULL-SOURCE
    description: Phase2 can synthesize from structured context after refresh without requiring full source text.
    expected_ok: true
    test_reference: world-studio-phase2-without-full-source.test.mjs
    source_rule: WS-ACC-002
  - id: WS-006-START-TIME-PROJECTION-NONDESTRUCTIVE
    description: Start-time projection splits current/future events and supports restoration when selecting later start.
    expected_ok: true
    test_reference: world-studio-start-time-projection.test.mjs
    source_rule: WS-ACC-002
  - id: WS-007-PUBLISH-AGENT-DRAFT-FULL-PROFILE
    description: Publish keeps world-owned agent payload with rules, lorebooks, and dna fields when provided.
    expected_ok: true
    test_reference: world-studio-agent-drafts-flow.test.mjs
    source_rule: WS-ACC-002
  - id: WS-008-HANDLE-NORMALIZATION-ASCII
    description: Invalid agent handle is normalized to ASCII-safe fallback before batch create.
    expected_ok: true
    test_reference: world-studio-agent-drafts-flow.test.mjs
    source_rule: WS-ACC-002
  - id: WS-009-CONFLICT-RELOAD-REPLACE-UNSAVED
    description: Reload remote replaces unsaved maintenance snapshot and resets unsaved flags.
    expected_ok: true
    source_rule: WS-ACC-002
  - id: WS-010-RELOAD-RECOVERY-RESUMABLE
    description: Reloaded live task becomes PAUSED when resumable, FAILED when not resumable.
    expected_ok: true
    reason_code: WORLD_STUDIO_TASK_RECOVERY_INTERRUPTED
    source_rule: WS-ACC-002
  - id: WS-011-MAINTENANCE-CONFLICT-MAPPED
    description: Version conflict from backend is mapped to WORLD_STUDIO_MAINTENANCE_CONFLICT.
    expected_ok: true
    reason_code: WORLD_STUDIO_MAINTENANCE_CONFLICT
    source_rule: WS-ACC-002
  - id: WS-012-QUALITY-GATE-BLOCKS-PHASE2
    description: Quality gate BLOCK must prevent phase2 progression and surface blocked reason code.
    expected_ok: false
    reason_code: WORLD_STUDIO_PHASE1_QUALITY_GATE_BLOCKED
    source_rule: WS-ACC-002
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:world-studio-kernel-docs
    source_rule: WS-ACC-003
  - command: pnpm -C nimi-mods run check:spec:world-studio-kernel-docs-drift
    source_rule: WS-ACC-003
  - command: pnpm -C nimi-mods run check:spec:world-studio-kernel-consistency
    source_rule: WS-ACC-003
