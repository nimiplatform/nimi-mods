version: 2026-03-01-v1
assembly_chain:
  - provider-2a
  - extract-keywords
  - consumer-2b
inputs:
  world:
    - worldview
    - worldEvents
    - worldLorebooks
  agent:
    - profiles
    - memories
    - rules
    - lorebooks
  narrative_context_scopes:
    - CANON
    - STORY
    - SUBJECT
    - RELATION
constraints:
  unbounded_full_context_injection_forbidden: true
  read_realm_via_stable_boundary_only: true
  narrative_context_cannot_store_world_or_agent_raw_payload: true
snapshot_required_fields:
  - place
  - worldviewRules
  - sceneMaterial
  - availableActors
  - narrativeStyle
  - characterRelations
  - narrativeContextScopes
