version: 2026-03-01-v1
execution_chain:
  - step0-intent
  - step1-assembly
  - step2-generate
  - step3-guard
  - write-spine
state_machine:
  RECEIVED:
    preconditions:
      - turn_input_schema_valid
    next: STEP0_INTENT
  STEP0_INTENT:
    preconditions:
      - story_accessible
    next: STEP1_ASSEMBLY
  STEP1_ASSEMBLY:
    preconditions:
      - world_and_agent_read_surface_available
    next: STEP2_GENERATE
  STEP2_GENERATE:
    preconditions:
      - model_route_available
    next: STEP3_GUARD
  STEP3_GUARD:
    outcomes:
      - APPROVED
      - ADJUSTED
      - REJECTED
  WRITE_SPINE:
    preconditions:
      - check_status_in_APPROVED_or_ADJUSTED
    next: COMPLETED
  REJECT_TERMINAL:
    preconditions:
      - check_status_REJECTED
    next: TERMINATED
hard_constraints:
  rejected_must_not_write_spine: true
  adjusted_must_write_adjusted_output: true
  causal_enrichment_failure_is_best_effort_warning: true
