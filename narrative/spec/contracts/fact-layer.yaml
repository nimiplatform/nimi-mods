version: 2026-03-01-v1
layers:
  base:
    owner: realm
    source: world+agent
  narrative:
    owner: narrative
    output: CoreOutput
  renderer:
    owner: textplay|videoplay
    write_access_to_narrative_spine: forbidden
core_output:
  top_level_whitelist:
    - spineEvents
    - stateChanges
    - metrics
visibility:
  enum:
    - public
    - internal
    - sensory
  default: public
  invalid_behavior: fail-close
narrative_context:
  scopes:
    - CANON
    - STORY
    - SUBJECT
    - RELATION
  stores_world_or_agent_raw_facts: false
