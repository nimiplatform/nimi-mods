version: 2026-03-01-v1
codes:
  - code: NARRATIVE_INPUT_INVALID
    stage: input
    blocking: true
    actionHint: 修正 turn input 字段后重试。
  - code: NARRATIVE_CONTEXT_INSUFFICIENT
    stage: step1-assembly
    blocking: true
    actionHint: 补齐 CANON/STORY/SUBJECT/RELATION 必要投影后重试。
  - code: NARRATIVE_GENERATION_SCHEMA_INVALID
    stage: step2-generate
    blocking: true
    actionHint: 修正 CoreOutput schema 约束后重试。
  - code: NARRATIVE_VISIBILITY_INVALID
    stage: step3-guard
    blocking: true
    actionHint: 修正 visibility 为 public|internal|sensory。
  - code: NARRATIVE_EVENT_COUNT_UNDERFLOW
    stage: step3-guard
    blocking: true
    actionHint: 提高最小事件产出后重试。
  - code: NARRATIVE_EVENT_COUNT_OVERFLOW_ADJUSTED
    stage: step3-guard
    blocking: false
    actionHint: 已按上限截断并继续写入 adjustedOutput。
  - code: NARRATIVE_SPINE_WRITE_CONFLICT
    stage: write-spine
    blocking: true
    actionHint: 修复 spine 并发冲突后重试。
  - code: NARRATIVE_INITIATIVE_COOLDOWN_ACTIVE
    stage: initiative
    blocking: false
    actionHint: 等待 cooldown 后再触发 initiative。
