version: 1
policies:
  - policy: top_level_whitelist_enforced
    value: true
    source_rule: N-GUARD-001
  - policy: visibility_invalid_fail_close
    value: true
    source_rule: N-GUARD-002
  - policy: metrics_range_enforced
    value: true
    source_rule: N-GUARD-004
  - policy: unsupported_spine_type_behavior
    value: reject
    source_rule: N-GUARD-005
  - policy: empty_payload_behavior
    value: reject
    source_rule: N-GUARD-005
event_count_policy:
  underflow_behavior: reject
  overflow_behavior: adjust-truncate
  source_rule: N-GUARD-003
adjustment_requirements:
  - name: adjusted_output_must_replace_raw_output
    value: true
    source_rule: N-GUARD-006
  - name: adjustment_reason_required
    value: true
    source_rule: N-GUARD-006
audit_requirements:
  - name: check_result_must_be_auditable
    value: true
    source_rule: N-PIPE-006
  - name: request_id_required
    value: true
    source_rule: N-PIPE-006
