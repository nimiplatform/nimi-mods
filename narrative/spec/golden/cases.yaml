version: 2026-03-01-v1
modId: world.nimi.narrative
cases:
  - id: NAR-001-USERTURN-APPROVED
    description: UserTurn 生成合法 CoreOutput，守卫通过并写入 spine。
    expected:
      checkStatus: APPROVED
      writeSpine: true
      outputEventCount: 2

  - id: NAR-002-OVERFLOW-ADJUSTED
    description: 事件数超上限时守卫截断并写 adjustedOutput。
    expected:
      checkStatus: ADJUSTED
      reasonCode: NARRATIVE_EVENT_COUNT_OVERFLOW_ADJUSTED
      writeSpine: true

  - id: NAR-003-INVALID-VISIBILITY-REJECTED
    description: 非法 visibility 触发 fail-close，拒绝写入。
    expected:
      checkStatus: REJECTED
      reasonCode: NARRATIVE_VISIBILITY_INVALID
      writeSpine: false

  - id: NAR-004-CONTEXT-MISSING-REJECTED
    description: Step1 关键 scope 缺失时直接失败。
    expected:
      checkStatus: REJECTED
      reasonCode: NARRATIVE_CONTEXT_INSUFFICIENT
      writeSpine: false

  - id: NAR-005-INITIATIVE-COOLDOWN-NOOP
    description: Initiative 命中 cooldown 返回 NOOP，不触发 processTurn。
    expected:
      fired: false
      reasonCode: NARRATIVE_INITIATIVE_COOLDOWN_ACTIVE
