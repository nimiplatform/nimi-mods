version: 2026-02-28
modId: world.nimi.narrative
cases:
  - id: NAR-001-USERTURN-APPROVED
    description: UserTurn 生成合法 CoreOutput，守卫通过并写入 spine。
    input:
      turnInput:
        storyId: story_main_001
        triggerSource: UserTurn
        userMessage: "韩立试探落云宗护山阵法。"
      generatedOutput:
        spineEvents:
          - type: ACTION
            visibility: public
            payload:
              actor: 韩立
              action: 试探阵法边界
          - type: DIALOGUE
            visibility: public
            payload:
              speaker: 落云宗执法长老
              content: "来者止步，报上名号。"
        stateChanges:
          story:
            phase: RISING
        metrics:
          tension: 0.62
    expected:
      checkStatus: APPROVED
      writeSpine: true
      outputEventCount: 2

  - id: NAR-002-OVERFLOW-ADJUSTED
    description: 事件数超过 normal 模式上限时，守卫自动截断并写入 adjustedOutput。
    input:
      mode: normal
      eventCountRule:
        min: 1
        max: 3
      generatedOutput:
        spineEvents:
          - { type: ACTION, payload: { actor: 韩立, action: 起手布阵 } }
          - { type: ACTION, payload: { actor: 哆啦A梦, action: 打开任意门 } }
          - { type: ACTION, payload: { actor: 守山弟子, action: 结印反制 } }
          - { type: DIALOGUE, payload: { speaker: 韩立, content: "再来。" } }
        stateChanges: {}
        metrics: { tension: 0.71 }
    expected:
      checkStatus: ADJUSTED
      reasonCode: NARRATIVE_EVENT_COUNT_OVERFLOW_ADJUSTED
      writeSpine: true
      outputEventCount: 3

  - id: NAR-003-INVALID-VISIBILITY-REJECTED
    description: 非法 visibility 触发 fail-close，拒绝写入。
    input:
      generatedOutput:
        spineEvents:
          - type: ACTION
            visibility: private
            payload:
              actor: 韩立
              action: 心念一转
        stateChanges: {}
        metrics:
          tension: 0.45
    expected:
      checkStatus: REJECTED
      reasonCode: NARRATIVE_VISIBILITY_INVALID
      writeSpine: false

  - id: NAR-004-CONTEXT-MISSING-REJECTED
    description: Step1 无法获取关键 scope 投影时直接失败。
    input:
      step1Context:
        hasCanon: true
        hasStory: true
        hasSubject: false
        hasRelation: false
    expected:
      checkStatus: REJECTED
      reasonCode: NARRATIVE_CONTEXT_INSUFFICIENT
      writeSpine: false

  - id: NAR-005-INITIATIVE-COOLDOWN-NOOP
    description: Initiative 规则命中但在 cooldown 内，返回 NOOP，不触发 processTurn。
    input:
      initiative:
        ruleId: idle_world_advance
        inCooldown: true
        presence: idle
    expected:
      fired: false
      reasonCode: NARRATIVE_INITIATIVE_COOLDOWN_ACTIVE
