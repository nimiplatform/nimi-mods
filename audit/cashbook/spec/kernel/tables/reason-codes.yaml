version: 1
codes:
  - code: CASHBOOK_INPUT_EMPTY
    stage: input-receive
    blocking: true
    action_hint: Provide expense description text or voice input.
    source_rule: CSB-ERR-001
  - code: CASHBOOK_PARSE_NO_AMOUNT
    stage: llm-parse
    blocking: true
    action_hint: Could not detect an amount. Please include the amount spent.
    source_rule: CSB-ERR-001
  - code: CASHBOOK_PARSE_SCHEMA_INVALID
    stage: schema-validate
    blocking: true
    action_hint: Parsed output failed validation. Retry with clearer description.
    source_rule: CSB-ERR-001
  - code: CASHBOOK_STT_FAILED
    stage: stt-transcribe
    blocking: false
    action_hint: Voice transcription failed. Try again or type your expense.
    source_rule: CSB-ERR-004
  - code: CASHBOOK_ROUTE_UNAVAILABLE
    stage: llm-parse
    blocking: true
    action_hint: No AI route available. Check runtime configuration.
    source_rule: CSB-ERR-002
  - code: CASHBOOK_AI_GENERATE_FAILED
    stage: llm-parse
    blocking: true
    action_hint: AI generation failed. Retry or simplify input.
    source_rule: CSB-ERR-002
  - code: CASHBOOK_ENRICHMENT_FAILED
    stage: llm-extract
    blocking: false
    action_hint: Could not extract requested dimension. Raw data may lack sufficient context.
    source_rule: CSB-ERR-001
  - code: CASHBOOK_QUERY_NO_DATA
    stage: context-load
    blocking: false
    action_hint: No transactions found for the queried period.
    source_rule: CSB-ERR-001
