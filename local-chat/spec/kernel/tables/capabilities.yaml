version: 1
mod_identity:
  mod_id: world.nimi.local-chat
  name: Local Chat
  entry: ./dist/mods/local-chat/index.js
  source_rule: LC-CAP-001
required_capabilities:
  - key: llm.text.generate
    source_rule: LC-CAP-001
  - key: llm.text.stream
    source_rule: LC-CAP-001
  - key: llm.speech.providers.list
    source_rule: LC-CAP-003
  - key: llm.speech.voices.list
    source_rule: LC-CAP-003
  - key: llm.speech.synthesize
    source_rule: LC-CAP-003
  - key: llm.speech.stream.open
    source_rule: LC-CAP-003
  - key: llm.speech.stream.control
    source_rule: LC-CAP-003
  - key: llm.speech.stream.close
    source_rule: LC-CAP-003
  - key: llm.speech.transcribe
    source_rule: LC-CAP-003
  - key: data.register.data-api.local-chat.chat-targets.list
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.chat-targets.list
    source_rule: LC-CAP-001
  - key: data.register.data-api.local-chat.chat-target.detail
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.chat-target.detail
    source_rule: LC-CAP-001
  - key: data.register.data-api.local-chat.sessions.list
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.sessions.list
    source_rule: LC-CAP-001
  - key: data.register.data-api.local-chat.sessions.get
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.sessions.get
    source_rule: LC-CAP-001
  - key: data.register.data-api.local-chat.sessions.upsert
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.sessions.upsert
    source_rule: LC-CAP-001
  - key: data.register.data-api.local-chat.sessions.delete
    source_rule: LC-CAP-001
  - key: data.query.data-api.local-chat.sessions.delete
    source_rule: LC-CAP-001
  - key: data.query.data-api.runtime.route.options
    source_rule: LC-CAP-004
  - key: ui.register.ui-extension.app.sidebar.mods
    source_rule: LC-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    source_rule: LC-CAP-001
  - key: ui.register.ui-extension.runtime.devtools.panel
    source_rule: LC-CAP-001
allowed_sdk_surfaces:
  - package: '@nimiplatform/sdk/mod/ai'
    apis:
      - generateText
      - streamText
      - generateObject
      - synthesizeSpeech
      - transcribeAudio
      - generateEmbedding
    source_rule: LC-CAP-002
  - package: '@nimiplatform/sdk/mod/hook'
    source_rule: LC-CAP-002
forbidden_patterns:
  - pattern: sdk-mod-host-direct-import
    reason: bypasses stable mod SDK boundary
    source_rule: LC-CAP-002
  - pattern: provider-private-audio-http
    reason: bypasses speech capability governance
    source_rule: LC-CAP-003
