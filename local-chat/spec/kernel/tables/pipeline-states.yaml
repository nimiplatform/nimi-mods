version: 1
session_lifecycle:
  - state: TARGET_SELECTED
    source_rule: LC-PIPE-002
  - state: SESSION_AUTO_CREATED
    source_rule: LC-PIPE-002
  - state: SESSION_ACTIVE
    source_rule: LC-PIPE-002
  - state: SESSION_DELETED
    source_rule: LC-PIPE-002
text_turn_chain:
  - step: input-received
    order: 1
    source_rule: LC-PIPE-001
  - step: prompt-assemble
    order: 2
    source_rule: LC-PIPE-001
  - step: route-resolve
    order: 3
    source_rule: LC-PIPE-001
  - step: assistant-generate
    order: 4
    source_rule: LC-PIPE-001
  - step: turns-persist
    order: 5
    source_rule: LC-PIPE-001
  - step: diagnostics-persist
    order: 6
    source_rule: LC-PIPE-004
speech_turn_chain:
  - step: speech-input
    order: 1
    source_rule: LC-PIPE-003
  - step: route-resolve
    order: 2
    source_rule: LC-PIPE-003
  - step: speech-synthesize-or-transcribe
    order: 3
    source_rule: LC-PIPE-003
  - step: diagnostics-persist
    order: 4
    source_rule: LC-PIPE-004
proactive_turn_chain:
  - step: heartbeat-tick
    order: 1
    source_rule: LC-PIPE-005
  - step: target-and-session-scan
    order: 2
    source_rule: LC-PIPE-005
  - step: policy-evaluate
    order: 3
    source_rule: LC-PIPE-005
  - step: decision-generate
    order: 4
    source_rule: LC-PIPE-005
  - step: proactive-turn-persist
    order: 5
    source_rule: LC-PIPE-005
  - step: proactive-audit-persist
    order: 6
    source_rule: LC-PIPE-005
route_scope_policy:
  override_scope: local-chat-only
  must_not_mutate_global_defaults: true
  source_rule: LC-PIPE-001
