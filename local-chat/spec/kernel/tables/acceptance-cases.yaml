version: 1
cases:
  - id: LC-001-SESSION-FIRST-CREATE
    description: First enter on target auto-creates default session.
    expected_ok: true
    reason_code: null
    source_rule: LC-ACC-002
  - id: LC-002-ASSISTANT-TURN-AUDIT
    description: Assistant turn persists diagnostics and audit context.
    expected_ok: true
    reason_code: null
    source_rule: LC-ACC-002
  - id: LC-003-ROUTE-OVERRIDE-LOCAL-SCOPE
    description: Route override affects local-chat only and does not mutate global defaults.
    expected_ok: true
    reason_code: null
    source_rule: LC-ACC-002
  - id: LC-004-TTS-FAIL-NONBLOCKING
    description: TTS failure is recorded as diagnostics without blocking text turn commit.
    expected_ok: true
    reason_code: LOCAL_CHAT_TTS_FAILED
    source_rule: LC-ACC-002
  - id: LC-005-SESSION-DELETE-RECOVER
    description: Deleting active session recovers to latest remaining session or auto-creates one.
    expected_ok: true
    reason_code: null
    source_rule: LC-ACC-002
  - id: LC-006-PROACTIVE-POLICY-DISABLED-BY-USER
    description: Proactive policy blocks contact when allowProactiveContact is disabled.
    expected_ok: true
    reason_code: LOCAL_CHAT_PROACTIVE_DISABLED_BY_USER_SETTING
    test_reference: local-chat-proactive-policy.test.mjs
    source_rule: LC-ACC-002
  - id: LC-007-PROACTIVE-POLICY-ALLOWED
    description: Proactive policy allows contact when wake strategy and idle window both satisfy policy gate.
    expected_ok: true
    reason_code: LOCAL_CHAT_PROACTIVE_ALLOWED
    test_reference: local-chat-proactive-policy.test.mjs
    source_rule: LC-ACC-002
  - id: LC-008-STREAM-SEGMENT-PARSER
    description: Stream parser uses explicit delimiter first, then double-newline fallback, and caps to 4 segments.
    expected_ok: true
    reason_code: LOCAL_CHAT_STREAM_SEGMENT_PARSE_OK
    test_reference: local-chat-stream-segment-parser.test.mjs
    source_rule: LC-ACC-002
  - id: LC-009-STREAM-LIFECYCLE-FINALIZE
    description: Streaming placeholder is replaced by first finalized assistant message, and streaming kind is not persisted.
    expected_ok: true
    reason_code: LOCAL_CHAT_STREAM_FINALIZE_OK
    test_reference: local-chat-turn-stream-lifecycle.test.mjs
    source_rule: LC-ACC-002
  - id: LC-010-NSFW-POLICY-GUARDRAIL
    description: NSFW policy defaults to disabled and only resolves to allowed on local-runtime when explicitly enabled.
    expected_ok: true
    reason_code: LOCAL_CHAT_NSFW_POLICY_GUARDRAIL_OK
    test_reference: local-chat-nsfw-policy.test.mjs
    source_rule: LC-ACC-002
  - id: LC-011-MEDIA-INTENT-PARSER
    description: Media intent parser supports explicit tags, escaped markers, malformed marker fallback, and marker-only cleanup.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_INTENT_PARSE_OK
    test_reference: local-chat-media-intent-parser.test.mjs
    source_rule: LC-ACC-002
  - id: LC-012-MEDIA-DELIVERY-LIFECYCLE
    description: Text delivery persists first; pending media is replaced by finalized image/video turn.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_DELIVERY_OK
    test_reference: local-chat-media-delivery-lifecycle.test.mjs
    source_rule: LC-ACC-002
  - id: LC-013-MEDIA-GENERATION-SOFT-CANCEL
    description: Switching session/context discards in-flight media result without polluting active session.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_SOFT_CANCELLED
    test_reference: local-chat-media-soft-cancel.test.mjs
    source_rule: LC-ACC-002
  - id: LC-014-MEDIA-CACHE-ROUNDTRIP
    description: Generated media bytes persist to local cache and return renderable URI with cache hit reuse.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_CACHE_WRITE_OK
    source_rule: LC-ACC-002
  - id: LC-015-EXPLICIT-MEDIA-REQUEST-PARSER
    description: Explicit media request parser recognizes Chinese/English requests, negation, and video priority.
    expected_ok: true
    reason_code: LOCAL_CHAT_EXPLICIT_MEDIA_REQUEST_PARSE_OK
    test_reference: local-chat-explicit-media-request-parser.test.mjs
    source_rule: LC-ACC-002
  - id: LC-016-MEDIA-PLANNER-AUTO-OR-DEGRADE
    description: Media planner returns structured auto decisions and silently degrades on invalid planner output.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_PLANNER_OK
    test_reference: local-chat-media-planner.test.mjs
    source_rule: LC-ACC-002
  - id: LC-017-MEDIA-PLANNER-COOLDOWN-GATE
    description: Automatic media planner is skipped when recent media cooldown or pending media gate is active.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_PLANNER_COOLDOWN_BLOCKED
    test_reference: local-chat-media-trigger-planner.e2e.test.ts
    source_rule: LC-ACC-002
  - id: LC-018-MEDIA-DEPENDENCY-CACHE-GATE
    description: Stale or not-ready media dependency cache prevents automatic media execution until refreshed ready.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_DEPENDENCY_NOT_READY
    test_reference: local-chat-media-trigger-planner.e2e.test.ts
    source_rule: LC-ACC-002
  - id: LC-019-MEDIA-PLANNER-TIMEOUT-DEGRADE
    description: Media planner timeout degrades to text-only and records non-blocking diagnostics.
    expected_ok: true
    reason_code: LOCAL_CHAT_MEDIA_PLANNER_TIMEOUT
    test_reference: local-chat-media-trigger-planner.e2e.test.ts
    source_rule: LC-ACC-002
  - id: LC-020-CONTEXT-BUNDLE-PROJECTION
    description: Conversation ledger projects user/assistant bundles into UI messages while preserving media semantic continuity.
    expected_ok: true
    reason_code: LOCAL_CHAT_CONTEXT_ASSEMBLE_OK
    test_reference: local-chat-continuity-ledger.test.mjs
    source_rule: LC-ACC-002
  - id: LC-021-RUNNING-SUMMARY-NONBLOCKING
    description: Running summary updates only after bundle persistence and never blocks text turn finalize.
    expected_ok: true
    reason_code: LOCAL_CHAT_RUNNING_SUMMARY_UPDATE_OK
    test_reference: local-chat-continuity-ledger.test.mjs
    source_rule: LC-ACC-002
  - id: LC-022-DURABLE-MEMORY-WRITE
    description: Typed durable memory writes user facts, relationship state, commitments, and open loops back into local-chat storage.
    expected_ok: true
    reason_code: LOCAL_CHAT_DURABLE_MEMORY_WRITE_OK
    test_reference: local-chat-continuity-ledger.test.mjs
    source_rule: LC-ACC-002
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:local-chat-kernel-docs
    source_rule: LC-ACC-001
  - command: pnpm -C nimi-mods run check:spec:local-chat-kernel-docs-drift
    source_rule: LC-ACC-001
  - command: pnpm -C nimi-mods run check:spec:local-chat-kernel-consistency
    source_rule: LC-ACC-001
  - command: pnpm -C nimi-mods run check
    source_rule: LC-ACC-001
