id: world.nimi.local-chat
name: Local Chat
version: 1.0.0
kind: capability-mod
icon: local-chat
entry: ./dist/mods/local-chat/index.js
description: >
  Adds hook-based local chat execution with chat-routing and read-only
  agent friend target loading for desktop local chat.
  This mod is optional and does not change desktop core cloud routing.
capabilities:
  - runtime.ai.text.generate
  - runtime.ai.text.stream
  - runtime.media.image.generate
  - runtime.media.video.generate
  - runtime.media.tts.list.voices
  - runtime.media.tts.synthesize
  - runtime.media.stt.transcribe
  - runtime.route.list.options
  - runtime.route.resolve
  - runtime.route.check.health
  - data.register.data-api.local-chat.chat-targets.list
  - data.query.data-api.local-chat.chat-targets.list
  - data.register.data-api.local-chat.chat-target.detail
  - data.query.data-api.local-chat.chat-target.detail
  - data.register.data-api.local-chat.sessions.list
  - data.query.data-api.local-chat.sessions.list
  - data.register.data-api.local-chat.sessions.get
  - data.query.data-api.local-chat.sessions.get
  - data.register.data-api.local-chat.sessions.upsert
  - data.query.data-api.local-chat.sessions.upsert
  - data.register.data-api.local-chat.sessions.delete
  - data.query.data-api.local-chat.sessions.delete
  - data.query.data-api.core.social.friends-with-details.list
  - data.query.data-api.core.user.by-id.get
  - data.query.data-api.core.user.by-handle.get
  - data.query.data-api.core.world.by-id.get
  - data.query.data-api.core.worldview.by-id.get
  - data.query.data-api.core.agent.memory.recall.for-entity
  - data.query.data-api.core.agent.memory.core.list
  - data.query.data-api.core.agent.memory.e2e.list
  - data.query.data-api.core.agent.memory.stats.get
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - ui.register.ui-extension.runtime.devtools.panel
ai:
  consume:
    - chat
    - image
    - video
    - tts
    - stt
  dependencies:
    required:
      - dependencyId: local-chat/chat-qwen2.5-7b
        kind: model
        capability: chat
        modelId: qwen2.5-7b-instruct
        repo: Qwen/Qwen2.5-7B-Instruct-GGUF
        engine: openai-compatible
        title: Qwen2.5 7B Instruct (default)
      - dependencyId: local-chat/image-z-image-turbo
        kind: model
        capability: image
        modelId: z-image-turbo
        repo: nimeka/z-image-turbo
        engine: openai-compatible
        title: Z-Image Turbo (default)
    optional:
      - dependencyId: local-chat/video-generate-token-node
        kind: node
        capability: video
        nodeId: video.generate.token-api
        title: Optional video generation node
      - dependencyId: local-chat/stt-local-node
        kind: node
        capability: stt
        nodeId: speech.stt.openai-compatible
        title: Optional local STT node
    alternatives:
      - alternativeId: local-chat-tts-qwen3
        preferredDependencyId: local-chat/tts-qwen3-1.7b
        options:
          - dependencyId: local-chat/tts-qwen3-1.7b
            kind: service
            capability: tts
            serviceId: qwen-tts-python
            modelId: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
            repo: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
            engine: qwen-tts-python
            title: Qwen3 TTS 1.7B (recommended)
          - dependencyId: local-chat/tts-qwen3-0.6b
            kind: service
            capability: tts
            serviceId: qwen-tts-python
            modelId: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
            repo: Qwen/Qwen3-TTS-12Hz-0.6B-VoiceDesign
            engine: qwen-tts-python
            title: Qwen3 TTS 0.6B
    preferred:
      chat: local-chat/chat-qwen2.5-7b
      image: local-chat/image-z-image-turbo
      tts: local-chat/tts-qwen3-1.7b
requires:
  - desktop-core-cloud-chat
