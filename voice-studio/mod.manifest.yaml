id: world.nimi.voice-studio
name: Voice Studio
version: 0.1.0
kind: capability-mod
entry: ./dist/mods/voice-studio/index.js
description: >
  多角色 AI 有声书生成工作室。
capabilities:
  - llm.text.generate
  - llm.text.stream
  - llm.speech.voices.list
  - llm.speech.providers.list
  - llm.speech.synthesize
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
  - event.publish.vs:synthesis:progress
  - event.subscribe.vs:synthesis:progress
ai:
  consume:
    - chat
    - speech
  dependencies:
    required:
      - dependencyId: voice-studio/chat-qwen2.5-7b
        kind: model
        capability: chat
        modelId: qwen2.5-7b-instruct
        repo: Qwen/Qwen2.5-7B-Instruct-GGUF
        engine: openai-compatible
        title: Qwen2.5 7B Instruct (analysis)
    optional:
      - dependencyId: voice-studio/tts-token-node
        kind: node
        capability: speech
        nodeId: speech.synthesize.token-api
        title: Token API TTS node
    preferred:
      chat: voice-studio/chat-qwen2.5-7b
