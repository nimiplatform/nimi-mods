version: 1
entry_modes:
  - mode: prompt-import
    description: user copies prompt, imports JSON result
    source_rule: KIS-PIPE-001
  - mode: runtime-ai
    description: mod invokes runtime AI and consumes generated result
    source_rule: KIS-PIPE-001
prompt_import_chain:
  - step: input-collect
    order: 1
    source_rule: KIS-PIPE-001
  - step: prompt-build
    order: 2
    source_rule: KIS-PIPE-001
  - step: import-result
    order: 3
    source_rule: KIS-PIPE-001
  - step: schema-validate
    order: 4
    source_rule: KIS-PIPE-002
  - step: render
    order: 5
    source_rule: KIS-PIPE-002
runtime_ai_chain:
  - step: input-collect
    order: 1
    source_rule: KIS-PIPE-001
  - step: route-resolve
    order: 2
    source_rule: KIS-PIPE-001
  - step: generate-result
    order: 3
    source_rule: KIS-PIPE-001
  - step: schema-validate
    order: 4
    source_rule: KIS-PIPE-002
  - step: render
    order: 5
    source_rule: KIS-PIPE-002
fallback_policy:
  from: runtime-ai
  to: prompt-import
  when_reason_code: KISMET_ROUTE_UNAVAILABLE
  source_rule: KIS-PIPE-003
export_policy:
  trigger: explicit-user-action-only
  formats:
    - json
    - pdf
    - html
  source_rule: KIS-PIPE-004
