version: 2026-03-01-v1
codes:
  - code: TEXTPLAY_INPUT_INVALID
    stage: input
    blocking: true
    actionHint: 补齐 player/userMessage/events 并重试。
  - code: TEXTPLAY_ROUTE_UNAVAILABLE
    stage: route
    blocking: true
    actionHint: 切换到可用 route source 后重试。
  - code: TEXTPLAY_PROMPT_BUILD_FAILED
    stage: build-prompt
    blocking: true
    actionHint: 修复 prompt 构建输入与模板约束。
  - code: TEXTPLAY_RENDER_EMPTY_RESPONSE
    stage: generate
    blocking: true
    actionHint: 切换模型或提高最小输出约束后重试。
  - code: TEXTPLAY_POV_VIOLATION_DETECTED
    stage: visibility-pov
    blocking: true
    actionHint: 收紧 POV 规则并重新渲染。
  - code: TEXTPLAY_CONTEXT_MISSING_CRITICAL
    stage: context
    blocking: true
    actionHint: 补齐 scene/agent/worldStyle 关键摘要后重试。
  - code: TEXTPLAY_PERSISTENCE_FAILED_WARN
    stage: persistence
    blocking: false
    actionHint: 检查存储链路；本次输出可继续返回。
