version: 2026-03-01-v1
execution_chain:
  - received
  - normalize
  - filter-visibility
  - build-prompt
  - generate
  - wrap-output
  - persist-best-effort
state_machine:
  RECEIVED:
    preconditions:
      - render_input_schema_valid
    next: NORMALIZE
  NORMALIZE:
    preconditions:
      - input_available
    next: FILTER_VISIBILITY
  FILTER_VISIBILITY:
    preconditions:
      - events_normalized
    next: BUILD_PROMPT
  BUILD_PROMPT:
    preconditions:
      - visible_events_ready
    next: GENERATE
  GENERATE:
    preconditions:
      - route_available
    next: WRAP_OUTPUT
  WRAP_OUTPUT:
    preconditions:
      - generated_text_non_empty
    next: RETURNED
  PERSIST_BEST_EFFORT:
    preconditions:
      - onRendered_provided
    failure_behavior: warn-nonblocking
constraints:
  half_structured_output_forbidden: true
  persistence_failure_cannot_block_render_output: true
