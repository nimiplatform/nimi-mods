version: 2026-03-01-v1
filtering_rules:
  keep_visibility:
    - public
    - sensory
  internal_visibility:
    keep_when_actor_equals_player: true
    actor_fields_priority:
      - thinker
      - decider
      - experiencer
      - owner
  invalid_visibility_behavior: reject
constraints:
  visibility_filter_must_apply: true
  pov_constraint_must_apply: true
  either_filter_disabled_is_protocol_violation: true
