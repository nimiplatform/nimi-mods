version: 2026-03-01-v1
input_source:
  required: narrative_core_output_projection
  direct_prose_bypass_forbidden: true
fact_boundary:
  creates_or_rewrites_narrative_facts: false
projection_mapping:
  - from: CoreOutput.spineEvents
    to: RenderInput.events
  - from: CoreOutput.metrics
    to: RenderInput.metrics
  - from: TurnInput.triggerSource
    to: RenderInput.triggerSource
  - from: TurnInput.userMessage
    to: RenderInput.userMessage
  - from: orchestration_context
    to: player|scene|agent|worldStyle
