version: 1
codes:
  - code: TEXTPLAY_INPUT_INVALID
    stage: input
    blocking: true
    action_hint: Complete player, userMessage, and events, then retry.
    source_rule: T-ERR-001
  - code: TEXTPLAY_ROUTE_UNAVAILABLE
    stage: route
    blocking: true
    action_hint: Switch to an available route source and retry.
    source_rule: T-ERR-001
  - code: TEXTPLAY_PROMPT_BUILD_FAILED
    stage: build-prompt
    blocking: true
    action_hint: Repair prompt template and normalized inputs.
    source_rule: T-ERR-001
  - code: TEXTPLAY_RENDER_EMPTY_RESPONSE
    stage: generate
    blocking: true
    action_hint: Tighten output floor or change model route.
    source_rule: T-ERR-001
  - code: TEXTPLAY_POV_VIOLATION_DETECTED
    stage: visibility-pov
    blocking: true
    action_hint: Enforce POV constraints and rerun render.
    source_rule: T-ERR-001
  - code: TEXTPLAY_CONTEXT_MISSING_CRITICAL
    stage: context
    blocking: true
    action_hint: Complete scene, agent, and worldStyle summary.
    source_rule: T-ERR-001
  - code: TEXTPLAY_PERSISTENCE_FAILED_WARN
    stage: persistence
    blocking: false
    action_hint: Investigate persistence path. Output already returned.
    source_rule: T-ERR-003
