version: 1
cases:
  - id: TXT-001-USERTURN-RENDER
    description: UserTurn renders non-empty text with meta payload.
    expected_ok: true
    min_char_count: 50
    reason_code: null
    source_rule: T-ACC-002
  - id: TXT-002-INTERNAL-FILTER-NPC
    description: NPC internal events are filtered before prompt build.
    expected_ok: true
    filtered_events_count: 1
    reason_code: null
    source_rule: T-ACC-002
  - id: TXT-003-INTERNAL-KEEP-PLAYER
    description: Player internal events are kept before prompt build.
    expected_ok: true
    filtered_events_count: 1
    reason_code: null
    source_rule: T-ACC-002
  - id: TXT-004-PERSISTENCE-WARN-NONBLOCKING
    description: Persistence warning does not block render output.
    expected_ok: true
    reason_code: TEXTPLAY_PERSISTENCE_FAILED_WARN
    output_returned: true
    source_rule: T-ACC-002
  - id: TXT-005-PRESENCE-IDLE-AWAY
    description: Presence transitions from idle to away and reports events.
    expected_ok: true
    report_sequence:
      - idle
      - away
    reason_code: null
    source_rule: T-ACC-002
  - id: TXT-006-RUN-CANCEL-TERMINAL
    description: Cancel path emits run.canceled and reaches CANCELED terminal state without run.error normalization.
    expected_ok: true
    reason_code: TEXTPLAY_RUN_CANCELED
    terminal_status: CANCELED
    source_rule: T-RUN-007
  - id: TXT-007-RECOVERY-GAP-REFILL
    description: Recovery with seq gap performs gap refill before applying new streaming events.
    expected_ok: true
    gap_refill_applied: true
    reason_code: null
    source_rule: T-RUN-008
verification_commands:
  - command: pnpm -C nimi-mods run generate:spec:textplay-kernel-docs
    source_rule: T-ACC-003
  - command: pnpm -C nimi-mods run check:spec:textplay-kernel-docs-drift
    source_rule: T-ACC-003
  - command: pnpm -C nimi-mods run check:spec:textplay-kernel-consistency
    source_rule: T-ACC-003
  - command: pnpm -C nimi-mods run check
    source_rule: T-ACC-003
