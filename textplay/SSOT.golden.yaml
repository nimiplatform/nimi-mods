version: 2026-02-28
modId: world.nimi.textplay
cases:
  - id: TXT-001-USERTURN-RENDER
    description: UserTurn 正常渲染，输出非空文本且含 meta。
    input:
      renderInput:
        triggerSource: UserTurn
        userMessage: "我向韩立拱手，询问落云宗近况。"
        player:
          name: 张奎
          identity: 散修
        scene:
          name: 落云峰山门
          description: 云雾缭绕，石阶湿冷。
          location: 落云宗
        agent:
          name: 韩立
          identity: 客卿长老
          personality: 冷静克制
        worldStyle:
          genre: xianxia
          tone: 冷峻
          themes: [修行, 因果]
        events:
          - type: DIALOGUE
            visibility: public
            payload:
              speaker: 韩立
              content: "此地近日不太平。"
    expected:
      ok: true
      output:
        minCharCount: 50
        hasMeta: true

  - id: TXT-002-INTERNAL-FILTER-NPC
    description: NPC internal 事件在进入 prompt 前被过滤。
    input:
      renderInput:
        triggerSource: AgentInitiative
        userMessage: "山门外灵压波动。"
        player: { name: 张奎, identity: 散修 }
        events:
          - type: THOUGHT
            visibility: internal
            payload:
              thinker: 韩立
              thought: "先试探此人底细。"
          - type: ACTION
            visibility: public
            payload:
              actor: 韩立
              action: 抬手示意守门弟子后退
    expected:
      filteredEventsCount: 1
      filteredOutContains:
        - "先试探此人底细。"

  - id: TXT-003-INTERNAL-KEEP-PLAYER
    description: 玩家自身 internal 事件保留进入 prompt。
    input:
      renderInput:
        triggerSource: UserTurn
        userMessage: "我沉默片刻，观察韩立神色。"
        player: { name: 张奎, identity: 散修 }
        events:
          - type: THOUGHT
            visibility: internal
            payload:
              thinker: 张奎
              thought: "他在试探我。"
    expected:
      filteredEventsCount: 1
      promptContains:
        - "他在试探我。"

  - id: TXT-004-PERSISTENCE-WARN-NONBLOCKING
    description: onRendered 持久化失败只告警，不阻断输出返回。
    input:
      renderInput:
        triggerSource: SystemEvent
        userMessage: "夜色骤沉，护山阵短暂失稳。"
        player: { name: 张奎, identity: 散修 }
        events:
          - type: ACTION
            payload:
              actor: 护山阵
              action: 灵光忽明忽暗
      onRenderedThrows: true
    expected:
      ok: true
      reasonCode: TEXTPLAY_PERSISTENCE_FAILED_WARN
      outputReturned: true

  - id: TXT-005-PRESENCE-IDLE-AWAY
    description: 会话计时链按 idle -> away 迁移并可上报 Narrative。
    input:
      presenceConfig:
        idleTimeoutMs: 60000
        awayTimeoutMs: 300000
      timeline:
        - atMs: 0
          event: onUserActive
        - atMs: 60000
          expectState: idle
        - atMs: 300000
          expectState: away
    expected:
      reportSequence:
        - idle
        - away
