id: world.nimi.textplay
name: TextPlay
version: 1.0.0
kind: capability-mod
icon: textplay
entry: ./dist/mods/textplay/index.js
description: >
  Narrative text renderer mod for player-interactive story progression.
capabilities:
  - llm.text.generate
  - data.query.data-api.runtime.route.options
  - data.query.data-api.world.access.me
  - data.query.data-api.world.events.list
  - data.query.data-api.world.lorebooks.list
  - data.query.data-api.core.agent.memory.recall.for-entity
  - data.register.data-api.textplay.render.persist
  - data.query.data-api.textplay.render.persist
  - ui.register.ui-extension.app.sidebar.mods
  - ui.register.ui-extension.app.content.routes
ai:
  consume:
    - chat
