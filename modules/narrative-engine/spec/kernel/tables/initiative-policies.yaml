version: 1
supported_trigger_sources:
  - source: UserTurn
    source_rule: N-INIT-001
  - source: AgentInitiative
    source_rule: N-INIT-001
  - source: SystemEvent
    source_rule: N-INIT-001
initiative_tick:
  noop_when_presence_in:
    - composing
    - active
  source_rule: N-INIT-002
cooldown:
  hit_behavior: no-fire
  reason_code: NARRATIVE_INITIATIVE_COOLDOWN_ACTIVE
  source_rule: N-INIT-003
cooldown_window:
  cooldown_window_seconds: 180
  source_rule: N-INIT-006
snapshot_runtime_state:
  required_fields:
    - lastFiredAt
    - consecutive
    - lastSceneFingerprint
  restore_on_story_hydrate: true
  source_rule: N-INIT-007
fired_path:
  must_call: process_turn
  source_rule: N-INIT-004
audit:
  initiative_decision_event_required: true
  source_rule: N-INIT-005
