version: 1
mod_identity:
  mod_id: world.nimi.buddy
  name: Buddy
  entry: ./dist/mods/buddy/index.js
  source_rule: BD-CAP-001
required_capabilities:
  - key: runtime.ai.text.generate
    purpose: 单次文本生成（回退路径）
    source_rule: BD-CAP-001
  - key: runtime.ai.text.stream
    purpose: 流式文本生成（主对话路径）
    source_rule: BD-CAP-001
  - key: runtime.media.tts.stream
    purpose: 流式语音合成（主 TTS 路径）
    source_rule: BD-CAP-003
  - key: runtime.media.tts.synthesize
    purpose: 单次语音合成（TTS 回退路径）
    source_rule: BD-CAP-003
  - key: runtime.media.tts.list.voices
    purpose: 查询可用语音列表
    source_rule: BD-CAP-003
  - key: runtime.media.stt.transcribe
    purpose: 语音转文字
    source_rule: BD-CAP-003
  - key: runtime.route.list.options
    purpose: 查询可用路由选项
    source_rule: BD-CAP-004
  - key: runtime.route.resolve
    purpose: 解析当前路由绑定
    source_rule: BD-CAP-004
  - key: runtime.route.check.health
    purpose: 检查路由健康状态
    source_rule: BD-CAP-004
  - key: data.store.mod-state
    purpose: 持久化对话历史和用户偏好
    source_rule: BD-CAP-001
  - key: ui.register.ui-extension.app.sidebar.mods
    purpose: 侧边栏导航入口
    source_rule: BD-CAP-001
  - key: ui.register.ui-extension.app.content.routes
    purpose: 主内容区域（Live2D Canvas + 对话 UI）
    source_rule: BD-CAP-001
allowed_sdk_surfaces:
  - package: '@nimiplatform/sdk/mod/runtime'
    apis:
      - ai.text.generate
      - ai.text.stream
      - media.tts.listVoices
      - media.tts.stream
      - media.tts.synthesize
      - media.stt.transcribe
      - route.listOptions
      - route.resolve
      - route.checkHealth
    source_rule: BD-CAP-002
  - package: '@nimiplatform/sdk/mod/hook'
    source_rule: BD-CAP-002
forbidden_patterns:
  - pattern: sdk-mod-host-direct-import
    reason: 绕过稳定 mod SDK 边界
    source_rule: BD-CAP-002
  - pattern: provider-private-audio-http
    reason: 绕过语音能力治理
    source_rule: BD-CAP-003
  - pattern: tauri-native-api-import
    reason: mod 不得直接调用 Tauri 原生 API
    source_rule: BD-CAP-002
  - pattern: external-ai-endpoint-fetch
    reason: 绕过运行时路由治理
    source_rule: BD-CAP-002
