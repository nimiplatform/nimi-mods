version: 1
description: 情绪标签到 Live2D 参数的映射表
source_rule: BD-ANIM-004

emotions:
  - id: happy
    label: 开心
    is_default: true
    is_transient: false
    params:
      ParamEyeLSmile: 0.7
      ParamEyeRSmile: 0.7
      ParamMouthForm: 0.8
      ParamCheek: 0.4
      ParamBrowLY: 0.1
      ParamBrowRY: 0.1
    source_rule: BD-ANIM-004

  - id: excited
    label: 兴奋
    is_default: false
    is_transient: true
    transient_duration_ms: 3000
    transient_fallback: happy
    params:
      ParamEyeLSmile: 0.9
      ParamEyeRSmile: 0.9
      ParamMouthForm: 1.0
      ParamCheek: 0.8
      ParamBrowLY: 0.3
      ParamBrowRY: 0.3
    source_rule: BD-ANIM-004

  - id: sad
    label: 难过
    is_default: false
    is_transient: false
    params:
      ParamEyeLSmile: 0
      ParamEyeRSmile: 0
      ParamMouthForm: -0.5
      ParamCheek: 0
      ParamBrowLY: -0.3
      ParamBrowRY: -0.3
    source_rule: BD-ANIM-004

  - id: surprised
    label: 惊讶
    is_default: false
    is_transient: true
    transient_duration_ms: 2000
    transient_fallback: happy
    params:
      ParamEyeLSmile: 0
      ParamEyeRSmile: 0
      ParamMouthForm: 0.3
      ParamCheek: 0
      ParamBrowLY: 0.5
      ParamBrowRY: 0.5
    source_rule: BD-ANIM-004

  - id: thinking
    label: 思考
    is_default: false
    is_transient: false
    params:
      ParamEyeLSmile: 0
      ParamEyeRSmile: 0
      ParamMouthForm: 0
      ParamCheek: 0
      ParamBrowLY: 0.2
      ParamBrowRY: -0.1
    saccade_override:
      target_x: 0.3
      target_y: 0.3
    source_rule: BD-ANIM-004

  - id: sleepy
    label: 困倦
    is_default: false
    is_transient: false
    params:
      ParamEyeLSmile: 0.3
      ParamEyeRSmile: 0.3
      ParamMouthForm: 0.2
      ParamCheek: 0.3
      ParamBrowLY: -0.1
      ParamBrowRY: -0.1
    eye_override:
      max_open: 0.4
    source_rule: BD-ANIM-004
