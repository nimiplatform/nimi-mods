version: 1
description: 动画插件使用的 Live2D 参数定义和约束
source_rule: BD-ANIM-001

plugins:
  - id: lip-sync
    priority: 10
    params:
      - id: ParamMouthOpenY
        range: [0, 1]
        default: 0
        description: 嘴巴张合程度
    phoneme_map:
      A: 1.0
      E: 0.7
      I: 0.5
      O: 0.8
      U: 0.6
      S: 0.0
    smoothing:
      attack_ms: 50
      release_ms: 80
      method: exponential
    source_rule: BD-ANIM-006

  - id: expression-driver
    priority: 20
    params:
      - id: ParamEyeLSmile
        range: [0, 1]
        default: 0
        description: 左眼笑眯程度
      - id: ParamEyeRSmile
        range: [0, 1]
        default: 0
        description: 右眼笑眯程度
      - id: ParamMouthForm
        range: [-1, 1]
        default: 0
        description: 嘴型（-1 撇嘴 / +1 微笑）
      - id: ParamCheek
        range: [0, 1]
        default: 0
        description: 脸红程度
      - id: ParamBrowLY
        range: [-1, 1]
        default: 0
        description: 左眉上下
      - id: ParamBrowRY
        range: [-1, 1]
        default: 0
        description: 右眉上下
    transition:
      duration_ms: 300
      easing: easeInOutCubic
    source_rule: BD-ANIM-004

  - id: auto-blink
    priority: 30
    params:
      - id: ParamEyeLOpen
        range: [0, 1]
        default: 1
        description: 左眼睁开程度
      - id: ParamEyeROpen
        range: [0, 1]
        default: 1
        description: 右眼睁开程度
    timing:
      interval_min_ms: 3000
      interval_max_ms: 6000
      close_ms: 80
      hold_ms: 40
      open_ms: 120
      close_easing: easeInQuad
      open_easing: easeOutQuad
    source_rule: BD-ANIM-002

  - id: eye-saccade
    priority: 40
    params:
      - id: ParamEyeBallX
        range: [-1, 1]
        default: 0
        description: 视线水平方向
      - id: ParamEyeBallY
        range: [-1, 1]
        default: 0
        description: 视线垂直方向
    behavior:
      target_range: [-0.5, 0.5]
      interval_min_ms: 800
      interval_max_ms: 3000
      interval_distribution: exponential_bias_short
      lerp_factor: 0.08
      pointer_follow_weight: 0.3
    source_rule: BD-ANIM-003

  - id: idle-breath
    priority: 50
    params:
      - id: ParamBreath
        range: [0, 1]
        default: 0.5
        description: 呼吸起伏
    waveform:
      type: sine
      period_s: 3.5
    source_rule: BD-ANIM-005
